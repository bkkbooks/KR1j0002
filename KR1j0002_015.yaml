body:
  text: 釋蟲第十五螜天螻蜚蠦蜰蚓𧊔入耳蜩蜋蜩螳蜩蚻蜻蜻蠽茅蜩蝒馬蜩霓寒蜩蜓蚞螇螰蛣蜣蜣蜋蝎蛣𧌑蠰齧桑諸慮奚相蜉蝣渠略蛂蟥蛢蠸輿父守瓜蝚蛖螻不蜩王蚥姑䗐強蝆不過蟷蠰其子蜱蛸蒺藜蝍蛆蝝蝮蜪蟋蟀蛬蟼蟆螁馬䗃蛗螽蠜草螽負蠜蜤螽蜙蝑蟿螽螇蚸土螽蠰溪螼蚓蜸蠶莫貈螳蜋蛑虰蛵負勞蜭毛蠹蟔蛅蟴蟠鼠負蟫白魚蛾羅螒天雞傅負版強蚚蛶螪何螝蛹蜆縊女蚍蜉大蟻小者蟻蠪朾蟻𧕈飛蟻其子蚳次蟗䵹蛛䵹蛛蛛蝥土䵹蛛草䵹蛛土蜂木蜂蟦蠐螬蝤蠐蝎蛜威委黍蟰蛸長踦蛭蝚至掌國貉蟲蠁蠖蚇蠖果裸蒲盧螟蛉桑蟲蝎桑蠹熒火即照密肌繼英蚅烏蠋蠓蠛蠓王蛈蝪蟓桑繭雔由樗繭棘繭欒繭蚢蕭繭翥醜罅螽醜奮強醜捋蜂醜螸蠅醜扇食苗心螟食葉蟘食節賊食根蟊有足謂之蟲無足謂之豸
