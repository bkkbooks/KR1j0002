body:
  text: 釋魚第十六鯉鱣鰋鯷鱧鯇鯊鮀鮂黑鰦鰼鰌鰹大鮦小者鮵魾大鱯小者鮡鰝大鰕鯤魚子鱀是鱁鱦小魚鮥鮛鮪鯦當魱鮤鱴刀鱊鮬鱖鯞魚有力者鰴魵鰕鮅鱒魴魾鯬鯠蜎蠉蛭蟣科斗活東魁陸蜪蚅鼁𪓰蟾諸在水者黽蜌螷蚌含漿鼈三足能龜三足賁蚹蠃螔蝓蠃小者蜬螖蠌小者蟧蜃小者珧龜俯者靈仰者謝前弇諸果後弇諸獵左倪不類右倪不若貝居陸贆在水者蜬大者魧小者鰿玄貝貽貝餘貾黃白文餘泉白黃文蚆博而頯蜠大而險𧐐小而橢蠑螈蜥蜴蜥蜴蝘蜓蝘蜓守宮也镻蝁螣螣蛇蟒王蛇蝮虺博三寸首大如擘鯢大者謂之鰕魚枕謂之丁魚腸謂之乙魚尾謂之丙一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜
