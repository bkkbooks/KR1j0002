body:
  text: 釋水第十二水泉泉一見一否為瀸井一有水一無水為瀱汋濫泉正出正出涌出也沃泉縣出縣出下出也氿泉穴出穴出仄出也湀闢流川過辨回川灉反入灘沙出汧出不流歸異出同流肥瀵大出尾下水醮曰厬水自河出為灉濟為濋汶為灛洛為波漢為潛淮為滸江為沱濄為洵潁為沙汝為濆水決之澤為汧決復入為汜河水清且灡漪大波為瀾小波為淪直波為徑江有沱河有灉汝有濆滸水崖水草交為湄濟有深涉深則厲淺則揭揭者揭衣也以衣涉水為厲繇膝以下為揭繇膝以上為涉繇帶以上為厲潛行為泳泛泛楊舟紼縭維之紼繂也縭緌也天子造舟諸侯維舟大夫方舟士特舟庶人乘泭水注川曰溪注溪曰谷注谷曰溝注溝曰澮注澮曰瀆逆流而上曰泝洄順流而下曰泝遊正絶流曰亂江河淮濟為四瀆四瀆者發源注海者也水中水中可居者曰洲小洲曰渚小渚曰沚小沚曰坻人所為為潏河曲河出崑崙虛色白所渠并千七百一川色黃百里一小曲千里一曲一直九河徒駭太史馬頰覆釜胡蘇簡潔鉤盤鬲津
