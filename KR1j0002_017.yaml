body:
  text: 釋鳥第十七隹其鳺鴀鶌鳩鶻鵃鳲鳩鴶鵴鷑鳩鵧鷑鴡鳩王鴡鵅鵋鶀鶅鵵軌鴗天狗鷚天鸙鵱鷜鵝鶬麋鴰鵅烏鸔舒鴈鵝舒鳧鶩鳽鵁鶄輿鵛鷋鵜鴮鸅鶾天雞鷽山鵲鷣負雀齧齒艾鶨鶀老鳸鴳桑鳸竊脂鳭鷯剖葦桃蟲鷦其雌鴱鶠鳳其雌皇鶺鴒雍渠鸒斯鵯鶋燕白脰烏鴽鴾母密肌繫英巂周燕燕鳦鴟梟鸋鴂狂茅鴟怪鴟梟鴟鶛劉疾生哺鷇生噣雛爰居雜縣春鳸鳻鶞夏鳸竊玄秋鳸竊藍冬鳸竊黃桑鳸竊脂棘鳸竊丹行鳸唶唶宵鳸嘖嘖鵖鴔戴鵀鶭澤虞鷀鷧鷯鶉其雄鶛牝庳鸍沈鳧鴢頭鵁鵽鳩寇雉萑老鵵鶟鶦鳥狂夢鳥皇黃鳥翠鷸鸀山烏蝙蝠服翼晨風鸇鸉白鷢寇雉泆泆鷏蚊母鷉須鸁鼯鼠夷由倉庚商庚鴩餔敊鷹鶆鳩鶼鶼比翼鵹黃楚雀鴷斫木鸄鶶鷵鸕諸雉鷺舂鉏鷂雉鷮雉鳪雉鷩雉秩秩海雉鸐山雉雗雉鵫雉雉絶有力奮伊洛而南素質五采皆備成章曰翬江淮而南青質五采皆備成章曰鷂南方曰𠷎東方曰鶅北方曰鵗西方曰鷷鳥鼠同穴其鳥為鵌其鼠為鼵鸛鷒鶝鶔如鵲短尾射之銜矢射人鵲鶪醜其飛也翪鳶烏醜其飛也翔鷹隼醜其飛也翬鳧鴈醜其足蹼其踵企烏鵲醜其掌縮亢鳥嚨其粻嗉鶉子鳼鴽子鸋雉之暮子為鷚鳥之雌雄不可別者以翼右掩左雄左掩右雌鳥少美長醜為鶹鷅二足而羽謂之禽四足而毛謂之獸鶪伯勞也倉庚黧黃也
