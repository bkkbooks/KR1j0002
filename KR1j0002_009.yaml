body:
  text: 釋地第九九州兩河間曰冀州河南曰豫州河西曰雍州漢南曰荊州江南曰楊州濟河間曰兗州濟東曰徐州燕曰幽州齊曰營州十藪魯有大野晉有大陸秦有楊陓宋有孟諸楚有雲夢吳越之間有具區齊有海隅燕有昭余祁鄭有圃田周有焦護八陵東陵阠南陵息慎西陵威夷中陵朱滕北陵西隃鴈門是也陵莫大於加陵梁莫大於湨梁墳莫大於河墳九府東方之美者有醫無閭之珣玗琪焉東南之美者有會稽之竹箭焉南方之美者有梁山之犀象焉西南之美者有華山之金石焉西方之美者有霍山之多珠玉焉西北之美者有崑崙虛之璆琳琅玕焉北方之美者有幽都之筋角焉東北之美者有斥山之文皮焉中有岱嶽與其五穀魚鹽生焉五方東方有比目魚焉不比不行其名謂之鰈南方有比翼鳥焉不比不飛其名謂之鶼鶼西方有比肩獸焉與邛邛岠虛比為邛邛岠虛齧甘草即有難邛邛岠虛負而走其名謂之蹶北方有比肩民焉迭食而迭望中有枳首蛇焉此四方中國之異氣也野邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰下溼曰隰大野曰平廣平曰原高平曰陸大陸曰阜大阜曰陵大陵曰阿可食者曰原陂者曰阪下者曰隰田一歲曰災二歲曰新田三歲曰畬四極東至於泰遠西至於邠國南至於濮鉛北至於祝栗謂之四極觚竹北戶西王母日下謂之四荒九夷八狄七戎六蠻謂之四海岠齊州以南戴日為丹穴北戴斗極為空桐東至日所出為大平西至日所入為大蒙大平之人仁丹穴之人智大蒙之人信空桐之人武
