body:
  text: 釋木第十四槄山檟栲山樗柏椈髡梱椵柂梅柟柀煔櫠椵杻檍楙木瓜椋即來栵栭穫落柚條時英梅楥匱枊栩杼味荎著櫙荎杜甘棠狄臧槔貢綦朹檕梅朻者聊魄榽橀梫木桂棆無疵椐匱柳河柳旄澤柳楊蒲柳權黃英輔小木杜赤棠白者棠諸慮山櫐欇虎櫐杞枸檵杬魚毒檓大椒楰鼠梓楓欇欇寓木宛童無姑其實夷櫟其實梂檖蘿楔荊桃旄冬桃榹桃山桃休無實李痤椄慮李駁赤李棗壺棗邊要棗櫅白棗樲酸棗楊徹齊棗遵羊棗洗大棗煮填棗蹶泄苦棗皙無實棗還味棯棗櫬梧朴枹者彙櫬采薪采薪即薪棪樕其劉劉杙櫰槐大葉而黑守宮槐葉晝聶宵炕槐小葉曰檟大而皵楸小而皵檟椅梓桋赤栜白者栜終牛棘灌木叢木瘣木苻婁蕡藹枹遒木魁瘣棫白桵梨山樆桑辨有椹梔女桑桋桑榆白枌唐棣栘常棣棣檟苦荼樕朴心榮桐木棧木干木檿桑山桑木自斃柛立死椔斃者翳木相磨槸棤皵梢梢擢樅松葉柏身檜柏葉松身句如羽喬下句曰朻上句曰喬木如楸曰喬如竹箭曰苞如松柏曰茂如槐曰茂祝州木髦柔英槐棘醜喬桑柳醜條椒樧醜莍桃李醜核瓜曰華之桃曰膽之棗李曰疐之樝梨曰鑽之小枝上繚為喬無枝為檄木族生為灌
