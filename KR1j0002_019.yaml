body:
  text: 釋畜第十九馬屬騊駼馬野馬駮如馬倨牙食虎豹騉蹄趼善陞甗騉駼枝蹄趼善陞甗小領盜驪絕有力駥膝上皆白惟馵四骹皆白驓四蹢皆白首前足皆白騱後足皆白翑前右足白啟左白踦後右足白驤左白馵駵馬白腹騵驪馬白跨驈白州驠尾本白騴尾白駺馰顙白顛白達素縣面顙皆白惟駹回毛在膺宜乘在肘後減陽在幹茀方在背闕廣逆毛居馻騋牝驪牡玄駒褭驂牡曰騭牝曰騇駵白駁黃白騜駵馬黃脊騝驪馬黃脊騽青驪駽青驪驎驒青驪繁鬣騥驪白雜毛駂黃白雜毛駓陰白雜毛駰蒼白雜毛騅彤白雜毛騢白馬黑鬣駱白馬黑脣駩黑喙騧一目白瞯二目白魚既差我馬差擇也宗廟齊毫戎事齊力田獵齊足牛屬犘牛𤜌牛犤牛犩牛犣牛犝牛犑牛角一俯一仰觭皆踊觢黑脣犉黑眥牰黑耳犚黑腹牧黑腳犈其子犢體長牬絕有力欣犌羊屬羊牡羒牝牂夏羊牡羭牝羖角不齊觤角三觠羷羳羊黃腹未成羊羜絕有力奮狗屬犬生三猣二師一玂未成毫狗長喙獫短喙猲獢絕有力狣尨狗也雞屬雞大者蜀蜀子雓未成雞僆絕有力奮六畜馬八尺為駥牛七尺為犉羊六尺為羬彘五尺為䝈狗四尺為獒雞三尺為鶤
