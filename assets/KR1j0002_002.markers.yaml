  - {type: variant, offset: 936, length: 21, content: 經也威則也苛妎也芾小也迷惑也狃復也逼迫也般, SBCK: 鏃作木縁椽弭尾蜃腎珧姚琡俶好耗瑗院縓缺􅒋赬敕呈纁勲􅉳於糾邸氐蓐辱箷移側士辨片韏眷䤹蘇婁卣酉釋樂第七徴知矢灑所蟹鼖墳應膺毊虚嬌篪池沂銀塤喧嘂叫剽瓢棧盞筊爻簥嬌篞乃結篎妙籥藥箹渥吹昌睡和胡卧咢五各寋紀展柷昌孰敔語籈眞鼗桃料聊釋天第八長丁丈嬴盈荐賤閼烏割著直略重直龍黓亦牂臧洽峽涒湯昆噩五各閹掩敦頓窒知乙塞先北陬側留寎孚柄且子余相息亮涂徒凱口改頽徒回猋必遥庉徒飄瓢􅀨芋曀於計應譍雺蒙螮帝蝀丁孔雩于句挈苦結弇霆廷霓倪䨘酥練涷東霡麥霂木霖林濟柤細霽徂計亢剛氏低析惜枵許嬌顓專頊旭虚墟定多佞娵子瑜觜咨降胡江咮渚究何胡可启啓欃初銜槍初庚彴蒲握礿藥燔煩庪居委縣􅀇磔責禷類禡罵禘大計肜容胙昨蒐搜獮息淺狩手又獠遼闐田綢叨杠江纁勲縿杉廣土曠長直亮旐兆斾佩毛旟餘釋地第九雝於用濟子礼陓於于藪叟阠信隃戍溴古壁珣荀玗于㑹古外稽古􅀆崘路昆虚虚􅚌尺鰈牒鶼兼邛巨凶岠巨齧五結難乃旦蟨厥迭徒結枳居是坰古螢溼濕陂披阪反菑緇畬餘邠彬濮卜觚􅀌釋丘第十敦都昆銳惠椉繩正陼渚潦老而}
