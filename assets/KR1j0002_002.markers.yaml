  - {type: variant, offset: 902, length: 33, content: 矏密也開闢也袍襺也障畛也靦姡也鬻糜也舒緩也翢纛也纛翳也隍壑也芼搴也, SBCK: 爾雅釋音卷中釋宫第五扆􅀝宧夷㝔要柣于結閾域楔古黠樞昌朱椳於回􅩖士坫店杇烏椹砧榩䖍􅉳於糾堊於故樴徒得杙亦楎暉臬魚列闍都榤竭垣􅀽塒時杗云廇力又梲拙䦕卞槉疾楶節桴浮榱衰檐簷樀滴簃丈知筄曜郷向屏卑井宁佇閍補耕觀貫衖巷塾熟橛其月闑魚列瓴靈甋的甓蒲覓壼苦本劇極隄低杠江徛􅀉陜狹釋器第六籩邊盎烏浪􅇲方九瓿蒲口瓵移瓠胡甈契斪衢斸丁録定多倿鐯張略鍬疀揷緵子弄罭域嫠離笱狗罺嘲汕所諫篧士角槮桑感罝嗟罞茆􅇾滯羉鸞罛􅀌繴壁罿衝罬拙罦浮絇其俱分粉卣由裗流䘽倪襮博縁餘絹純之閏袕穴褮營眥才細衱劫袸賤褑院衽稔袺結扱揷襜昌占褘暉縭离緌汝誰纀卜􅂢囚絹鑣表驕钀魚列轙儀呼盖餯許􅁾饐意餲隘糷輦糪柏餒奴罪斮荘略鮨祁醢海臡泥垽魚靳鼐耐圜􅀽鼒咨釴亦款苦管鬲力􅑄㝷鉹侈璲遂區羗于翮戸革縳篆緷衮虡巨藣卑蔌速蓋合璗蕩鏐留鐐遼鉼餅鈑板鈏引鵠斛觷嶽剒錯剫鐸璆求銑蘇}
