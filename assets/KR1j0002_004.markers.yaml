  - {type: variant, offset: 739, length: 0, content: '', SBCK: 婚姻爾雅卷上經四千一百三十二字注五千四百一十六字爾雅卷中郭璞注釋宫第五釋器第六釋樂第七釋天第八釋地第九釋丘第十釋山第十一釋水第十二釋宫第五宫謂之室室謂之宫皆所以通古今之異語明同實而兩名牖戸之閒謂之扆䆫東戸西也禮云斧扆者以其所在處名之其内謂之家今人稱家義出於此東西墻謂之序所以序別内外西南隅謂之奥室中隱奥之處西北隅謂之屋漏詩曰尚不媿於屋漏其義未詳東北隅謂之宧宧見禮亦未詳東南隅謂之㝔禮曰婦室聚㝔㝔亦隱閣柣謂之閾閾門限棖謂之楔門兩旁木楣謂之梁門戸上横梁樞謂之椳門户扉樞樞逹北方謂之落時門持樞者或逹北檼以爲固也落時謂之􅩖道二名也垝謂之坫在堂隅坫㙐也牆謂之墉書曰旣勤垣墉鏝謂之杇􅅺鏝椹謂之榩斫木櫍也地謂之黝黑飾地也牆謂之堊白飾牆也樴謂之杙橜也在牆者謂之楎禮記曰不敢縣於夫之楎箷在地者謂之臬即門橜也大者謂之栱長者謂之閣别杙所在長短之名闍謂之臺積土四方有木者謂之榭臺上起屋雞棲於弋爲榤鑿垣而棲爲塒今寒郷穿牆棲雞皆見詩植謂之傳傳謂之突戸持鏁植也見埤蒼杗廇謂之梁屋大梁也其上楹謂之梲侏儒柱也􅀜謂之槉柱上欂也亦名枅又曰㭼栭謂之楶即櫨也棟謂之桴屋檼桷謂之榱屋椽桷直而遂謂之閱謂五架屋際椽正相當直不受檐謂之交謂五架屋際椽不直上檐交於檼上檐謂之樀屋相容謂之防形如今牀頭小曲屏風唱射者所以自防隱見周禮連謂之移堂樓閣邊小屋今呼之簃厨連觀也屋上薄謂之筄屋笮兩階間謂之郷人君南郷當階間中庭之左右謂之位羣臣之列位也門屏之間謂之宁人君視朝所宁立處屏謂之樹小牆當門中閍謂之門詩曰祝祭於枋正門謂之應門朝門觀謂之闕宫門雙闕宫中之門謂之闈謂相通小門也其小者謂之閨小閨謂之閤大小異名衖門謂之閎左傳曰盟諸僖閎閎衖頭門門側之堂謂之塾夾門堂也橛謂之闑門閫闔謂之扉公羊傳曰齒著于門闔所以止扉謂之閎門辟旁長橛也左傳曰髙其閈閎閎長杙即門橜也瓴甋謂之甓㼾甎也今江東呼瓴甓宫中衖謂之壼巷閤間道廟中路謂之唐詩曰中唐有甓堂途謂之陳堂下至門徑也路旅途也途即道也路場猷行道也􅀶􅀃道之異名一逹謂之}
