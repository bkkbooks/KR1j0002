  - {type: variant, offset: 0, length: 277, content: 釋蟲第十五螜天螻蜚蠦蜰螾𧊔入耳蜩蜋蜩螗蜩蚻蜻蜻蠽茅蜩蝒馬蜩蜺寒蜩蜓蚞螇螰蛣蜣蜣蜋蝎蛣𧌑蠰齧桑諸慮奚相蜉蝣渠略蛂蟥蛢蠸輿父守瓜蝚蛖螻不蜩王蚥姑䗐強蝆不過蟷蠰其子蜱蛸蒺藜蝍蛆蝝蝮蜪蟋蟀蛬蟼蟆螁馬䗃蛗螽蠜草螽負蠜蜤螽蜙蝑蟿螽螇蚸土螽蠰谿螼蚓蜸蚕莫貈螳蜋蛑虰蛵負勞蜭毛蠹蟔蛅蟴蟠鼠負蟫白魚蛾羅螒天雞傅負版強蚚蛶螪何螝蛹蜆縊女蚍蜉大螘小者螘蠪朾螘𧕈飛螘其子蚳次蟗䵹鼄䵹鼄鼄蝥土䵹鼄草䵹鼄土蠭木蠭蟦蠐螬蝤蠐蝎蛜威委黍蟰蛸長踦蛭蝚至掌國貉蟲蠁蠖蚇蠖果臝蒲盧螟蛉桑蟲蝎桑蠹熒火即炤密肌繼英蚅烏蠋蠓蠛蠓王蛈蝪蟓桑繭雔由樗繭棘繭欒繭蚢蕭繭翥醜罅螽醜奮強醜捋蠭醜螸蠅醜扇食苗心, SBCK: ''}
