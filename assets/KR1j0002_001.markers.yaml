  - {type: variant, offset: 1356, length: 0, content: '', SBCK: 古者死亡尊卑同稱耳故尚書堯曰殂落舜曰陟方乃死爾雅音釋卷上夫扶興許譍鍵件摛癡贍時艶璞朴檮桃少詩照鑚子管㑹古外稡子外剟掇礫歷搴􅗅稂郎易以豉了療篲似銳企丘豉躅逐釋詁第一肈兆俶昌叔辟并亦幠呼厖亡江誕但訏吁箌罩昄蒲板晊之日極紀力弔的艐宗摧昨雷􅂌必寐予羊汝鮮息淺省先郢令力政綝勑金彀古豆妉丁含般盤樂洛遹聿度鐸諏子須彞夷辟婢亦辜􅀌辠罪齯倪鮐台耇狗亶丁但諶市林敖五報粤曰繇由於烏㪉閤郃合盍胡臘妃配媲普計纂子管忥戲謚侍貉陌謐密顗擬頠魚毀隕于閔磒于敏摽婢眇蘦零令力政畛稹告谷迥戸頂逷惕壞怪圯房美垝鬼寀七代樣毅義戡堪獮尠刺次亹尾蠠蜜釗招劭邵勔泯騖務暋閔強其丈卭五剛台怡下同􅂌必二陽賜予與餤談藎燼相息亮勴慮熲古迥劼苦黠掔牽疇直留暀旺藐邈褘衣輯集噰於恭勰恊重直龍觳學罊苦計殱尖揫子由蒐搜遄􅂳亟欺冀數朔亟居力寁昝阬坑漮康差叉柬簡慄栗戁女板恐丘勇慴之渉痡普胡瘏徒虺灰顇悴瘽勤瘉俞癙䑕癵力專㾖里痒羊疧祁痗妹瘥伹何痱肥􅓠亶瘵債癠徂細悝里盱吁繇遥勩與丗癉丁賀勞力報來賚強其丈思司嗣惄溺袚廢褫斯禴藥恪墟各諲因熯而善晙俊􅓄須竢士厎止徯胡禮噊聿烖哉􅠟析汽蓋肶毗埤脾竺篤遘搆遻悟監鑒涖利頫眺􅄟於計匿女力妥他窠遏烏曷射亦梏谷較角頲他頂易以豉矢弛並音户紙鮮息淺酢昨㬥剥樂洛覭陌髳蒙謟叨棐匪比毗志俌甫圉語呰紫􅜚嗟串五患貫慣黻弗畯俊諈竹睡諉女睡累劣僞􅉃慘窶求矩薆僾並音愛唈烏合挾叶浹接琛勑金紕備淩凌傭勑容氂離罽計燎料煁市針烓頃苛何筑竹奘徂朗駔粗泭孚遝沓畫􅀞賑之忍分符間懠才細僁屑度徒各眕之忍硈苦角嚻五刀懟隊縭離號毫謼火故逜悟顁丁佞遺唯季菼他敢薍五患餐孫耋迭輶酋俴踐綯陶躐獵疐致跲其禁柢帝閒閑斃弊踣蒲北僨糞僵姜潰會隌唵􅁳莫定䵑女乙闍都殛紀力􅁳亡定仆赴諗審弇掩䦧呼歷燬毀偟皇懊烏報忨五館愒苦蓋榰枝柱注慒囚黹致耻紩柣廯息淺逭換閒諫俔胡典沄云沆胡黨䠊扶味燠於六堛孚逼齊才細饘之然矏武延襺吉典靦他典姡滑鬻之六翢徒刀纛徒到妎胡計芾貝狃女九復扶又般班還旋緍民辟婢亦漦仕其華胡瓜釋訓第三斤居覲條由便婢緜廱於容惴之瑞憢許堯番波矯居兆藹烏害濟子禮思賜踖夕佗陀忯徒啓懕於占媞題懋茂慀暮慅騷赫釋墫七旬瞿居具蹻巨盧憍嬌夭夢亡工訰之閏懪雹儚亡崩爞同敖五髙傲五耗佌此痯管瘐羊主惸瓊愽圑怲柄畇巡畟楚力郝釋穟遂穮方遥桎丁秩穫戸郭溞蘇刀淅錫鐄横丁爭盡咨忍喈皆佻勑料契苦結尼女乙儵徒的嘒呼惠㻆胡犬刺七賜懽貫愮遥謞虚各訿子尓甹普經夆芳逢掣充丗遹述萲􅀽諼喧號毫雩于曁忌僩限烜喧尰時勇骭莧瘍羊拇􅅿媛于眷猗於冝襢但裼息馮平籧渠篨除夸誇擗婢亦拊撫緎域縫逢殿丁練屎希呻申幬紬侜張留罶力九釋親第四妣比從父從祖從母從並才用切晜昆姪徒結姒似娣第公鍾嫡的嬪頻}
