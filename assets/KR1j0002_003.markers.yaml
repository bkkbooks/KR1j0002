  - {type: variant, offset: 752, length: 1, content: 誰, SBCK: 書曰無或侜張爲幻爾雅音釋卷下釋草第十三蒮育韭九茖革葱忩葝巨盈䪥薤蒚力薜百蘄芹椵叚堇謹櫬襯薊計枹孚葥箭蔧邃菉緑蔏啇藋徒的蘩煩皤婆菣去刄蔚尉􅤴方寐莞官菥惜蓂覓蒤途瓠戸故瓣方莧茹如藘力居臝力果萑隹蓷他回虉逆粢咨衆終秫述菽叔萒恱轉蘥藥蘾戸怪薞孫萰練菟兔荄核蒵􅀆蔩演茢列薽眞豕傷氏荓瓶藱胡罪葖他忽蘆羅萉蒲北淔勑苬囚簜蕩苨禰菧底絰侍節菅姦菲匪芴物葍福䔰富萎威葋劬艼他丁熒廻萹匹善葴針薢皆茩狗芵決茪光莁巫荑夷蔱殺蘠牆􅚩大結瓝步角芍戸了蘱􅀋薡鼎蕫董蕛啼苵大結薈㑹蓼了蓧他凋蓨愓虋門芑起秠孚鄙稃敷稌杜藑瓊夫扶藆蹇藅伐莔萌荍翹蚍毗衃浮蕇典蔜五髙􅭚㛮􅘚縷莌奪蘢聾葑方孔蓯緫蒡旁荵忍莤由蓾魯才古柱主夫扶隧遂蘧巨俱􅂼山俱茝昌改蘮計蒘如髦毛蕀棘雚貫􅙛徒南莐沉蕍俞蕮}
