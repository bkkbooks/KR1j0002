  - {type: variant, offset: 754, length: 1, content: 昔, SBCK: 蔨巨隕􅓂霍莥女九薃浩媞提莞官蒚力茄加蕸遐蔤密華戸􅀲菡戸感萏徒感薏憶蘬丘軌蒫才何黂扶刃枲皁以菲匪蒠息蕢巨貴蘼美萹偏濼爍衆終莙其隕薻早蓫他六他羊苹平蓱瓶莃希藬吐回蘈頽藚續藾賴蔆凌攗眉薛百賛葥箭莓每藫潭蘜菊蓨他凋茥蒛缺葐盆芨急虃纎菺肩蘻計蕧服茡字藐亡角茈子爾脫奪蘵職蒢除藒挈芞乞葞尾蔠終菋未荎直其藸除蒤徒藈圭椉繩衱劫袶絳攫钁盱吁蔝米蔜五刀湅柬馗逵菌巨隕菆輙苕調蔈標茇沛蘪眉數朔鄰吝閔筡徒笐杭䈚待枹包芏杜其葴針戸藗速菤捲􅣀鱉莣亡藨蒲苗藨平表薂亦購古豆蔞力朱茢列葽烏了蒬冤茦􅁽刺次萩秋銚姚芅亦芣浮苢以綸古苀亡岡蠡禮萿古活搴居展拒巨朐劬芺荂吁蔈方腰猋必遥藨方驕芀調蒹兼薕廉菼他敢薍五患虇丘阮蕍俞芛羊棰葟皇荺于閔茭胡巧釋木第十四槄叨榎賈樗丑於椈菊髠坤梱五門椵叚柂夷柟而占柀彼煔衫櫠廢椵賈杻女九檍億楙茂椋良栵例栭而檴鑊楥􅀽抑卭栩香羽杼甞汝荎直之著儲藲歐荎大結槹皐綦其朹求檕計朻紏榽兮計橀許兮梫寢棆倫椐祛樻起愧櫐壘欇渉檵計楰􅁃欇輙寓魚具梂求檖遂楔戞榹斯要腰樲二洗屑典塡田泄屑還旋棯稔樸卜棪琰㯈速欀苦回槐懷聶輙炕呼郎椅於􅀉梀山厄瘣胡罪遒徂由棫域桵人佳樆离辨片枌墳栘移檿烏􅀧柛伸􅯦側吏棤錯皵舄梢朔櫂濁樅七容榝殺華胡化疐帝鑚子管繚了檄亦釋蟲第十五螜斛蜚費蠦盧蜰肥螾引􅨪演蜩調蚻札蠽節蝒縣蜓挺蚞木蛣起􅁻􅎙羌蝎曷􅔒屈蠰餉蜉浮蝣遊蛂歩結蟥黄蛢瓶蠸權父甫蝚柔武江䗐施蝆亡婢蟷丁郎蠰箱蜱毗蛸消蝍即蛆子余蝝縁蝮孚福蜪陶蛬拱蟼驚蛝閑䗃棧蛗阜螽終蠜煩蜤斯蜙嵩蝑胥蟿契歷蠰壤螼羌引蜸苦顯蚕他典貈鶴蛑謀虰丁蛵馨蜭戸感䘃墨蛅而占蟴斯蟠煩蟫淫䖸娥螒汗蚚祈蛶劣螪商螝􅀛蜆演螘魚綺蠪聾朾直耕尉蚳池蟗秋䵹知鼄誅蝥謀蠭蜂蟦費蝤囚􅢤伊蟰蕭蛸所交踦巨綺蛭猪秩蠖於郭蚇尺螟􅁳蛉零炤照蚅厄蠋蜀蠓莫孔蠛亡結蛈大結蝪湯蟓象雔讎蚢杭翥之庶罅呼暇螸俞􅬑特蟊謀豸丈爾釋魚第十六鱣張連鰋偃鯇華板鮀陀鮂囚鰦兹鰼習鰌秋鰹堅鮦同鮵奪魾皮鱯畫鮡兆鰝浩鰕霞鱀忌鱦承鮥洛鮛叔鮪偉鯦俱救魱胡鮤列鱴滅鱊聿鮬歩鱖厥鯞章酉鰴暉魵墳鮅必鱒才損魴房魾毗鯬黎鯠來蜎狂兖蠉香兖蟣祈鼁去􅖚秋蟾占黽猛蜌陛螷蒲猛能奴來賁奔蚹附蠃羅螔移蝓俞蜬含螖滑蠌澤蟧勞珧遥倪五計贆摽魧杭鼯吾鳺大結餔歩敊豉鶆來鵹離鴷列鸄激鶶唐鷵徒鉏鋤鷂遥鷮驕鳪卜鸐狄雗汗鵫丁􅇁翬暉􅔧儔鶅緇鵗希鷷遵鵌徒鼵突鸛歡鷒團鶝楅鶔柔射食亦工役翪宗鳶􅀇蹼􅁲亢戸郎嗉素鳼文鷚力救別彼列長丁丈鶹留􅝎栗黧力知釋獸第十八麔咎麎辰䴠於兆麚加麀於牛麛迷堅麕君麌魚矩麆助麜栗豜五見獥亦嬎芳萬迒剛䝐偉豶墳幺腰奏湊豱温豵宗橧豴滴􅘻垓􅙊厄豝巴虦棧貓苗貘陌甝含虪式六貀尼滑鼳古役麙巗曳乎各貆丸貒湍貗其禹貔毗􅩸火卜父甫貙樞獌萬麢零麠京麃炮􅕱几旄帽魋頽䝟烏八貐羊主驨胡圭羱元麐鄰麂几貄四彚謂刺次狒費被備蹯煩􅚵鈕猱奴刀蝯􅀽钁父甫泥奴細贙鉉豦據蜼誄椉承闕其越狃鈕鼢憤鼸胡忝鼷奚鼶斯鼬佑鼩劬鼭時鼣吠鼫石鼤問鼨終鼮廷鼰古覓齝丑之齛泄齸益釁許靳撟紀小狊古圓釋畜第十九騊陶駼徒倨鋸騉昆趼五見甗言駥戎馵注骹敲驓繒騱奚翑劬踦欺驤箱駵留騵五官驈聿驠宴晏駺郎馰的縣􅀇駹尨減古湛闋缺廣光馻兖褭奴了驂參騇舎騝䖍騽習駽呼縣驎良忍驒陀鬛獵騥柔鴇保駓皮駰乙巾騢遐駩詮喙許穢騧􅀲􅳌閑差叉犘麻犦雹犤悲犩危犣獵犝童犑古覓觭欺觢誓犉閏旬眥才細牰䄂犚尉犈權牬貝犌加羒憤牂臧羭俞羖古觤􅀑觠權羷險羳煩羜直吕猣宗玂祈獫力驗猲歇狣兆獢虚嬌雓餘僆練駥戎犉閏旬羬五咸􅇾滯􅙊厄獒五刀鶤昆爾雅音釋卷下道光甲申春仲􅀙藝芸書舍借来細勘一過知其佳䖏洵非以後諸刻所􅀎及}
