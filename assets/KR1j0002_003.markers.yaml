  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 小跽矏密也謂緻密開闢也書曰闢四門袍襺也左傳曰重襺衣裘障畛也謂壅障靦姡也面姡然鬻糜也淖糜舒緩也謂遲緩翢纛也今之羽葆幢纛翳也舞者所以自蔽翳隍壑也城池空者爲壑芼搴也謂拔取菜典經也威則也威儀可法則苛妎也煩苛者多嫉妎芾小也芾者小貌迷惑也狃復也狃􅏸復爲逼迫也般還也左傳曰般馬之聲班賦也謂布與濟渡也濟成也濟益也所以廣異訓各隨事爲義緍綸也詩曰維絲伊緍緡繩也江東謂之綸辟歷也未詳漦盝也漉漉出涎沫寛綽也謂寛􅁉也衮黻也衮衣有黻文華皇也釋草曰葟華榮昆後也謂先後方俗語彌終也终竟也}
  - {type: page-break, offset: 0, content: '', id: KR1j0002_SBCK_003-1a}
