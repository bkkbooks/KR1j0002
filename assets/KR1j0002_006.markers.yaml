  - {type: variant, offset: 57, length: 551, content: 嫠婦之笱謂之罶罺謂之汕篧謂之罩槮謂之涔鳥罟謂之羅兔罟謂之罝麋罟謂之罞彘罟謂之羉魚罟謂之罛繴謂之罿罿罬也罬謂之罦罦覆車也絇謂之救律謂之分大版謂之業繩之謂之縮之彝卣罍器也小罍謂之坎衣裗謂之䘽黼領謂之襮緣謂之純袕謂之褮衣眥謂之襟衱謂之裾衿謂之袸佩衿謂之褑執衽謂之袺扱衽謂之襭衣蔽前謂之襜婦人之褘謂之縭縭緌也裳削幅謂之纀輿革前謂之鞎後謂之笰竹前謂之禦後謂之蔽環謂之捐鑣謂之钀載轡謂之轙轡首謂之革餀謂之餯食饐謂之餲摶者謂之糷米者謂之糪肉謂之敗魚謂之餒肉曰脫之魚曰斮之冰脂也肉謂之羹魚謂之鮨肉謂之醢有骨者謂之臡康謂之蠱澱謂之垽鼎絕大謂之鼐圜弇上謂之鼒附耳外謂之釴款足者謂之鬲䰝謂之鬵鬵鉹也璲瑞也玉十謂之區羽本謂之翮一羽謂之箴十羽謂之縳百羽謂之緷木謂之虡旄謂之藣菜謂之蔌白蓋謂之苫黃金謂之璗其美者謂之鏐白金謂之銀其美者謂之鐐鉼金謂之鈑錫謂之鈏象謂之鵠角謂之觷犀謂之剒木謂之剫玉謂之雕金謂之鏤木謂之刻骨謂之切象謂之磋玉謂之琢石謂之磨璆琳玉也簡謂之畢不律謂之筆滅謂之點絕澤謂之銑金鏃翦羽謂之鍭骨鏃不翦羽謂之志弓有緣者謂之弓無緣者謂之弭以金者謂之銑以蜃者謂之珧以玉者謂之珪珪大尺二寸謂之玠璋大八寸謂之琡璧大六寸謂之宣肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環繸綬也一染謂之縓再染謂之赬三染謂之纁青謂之蔥黑謂之黝斧謂之黼邸謂之柢, SBCK: ''}
