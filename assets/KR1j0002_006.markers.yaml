  - {type: variant, offset: 643, length: 0, content: '', SBCK: 不大不小者釋樂第七宫謂之重商謂之敏角謂之經徴謂之迭羽謂之柳皆五音之别名其義未詳大瑟謂之灑長八尺一寸廣一尺八寸二十七􅃶大琴謂之離或曰琴大者二十七􅃶未詳長短廣雅曰琴長三尺六寸六分五􅃶大鼔謂之鼖鼖長八尺小者謂之應詩曰應􅉧縣鼔在大鼔側大磬謂之毊毊形似犂錧以玉石爲之大笙謂之巢列管瓠中施簧管端大者十九簧小者謂之和十三簧者郷射記曰三笙一和而成聲大箎謂之沂箎以竹爲之長尺四寸圍三寸一孔上出一三分名翹横吹之小者尺二寸廣雅云八孔寸大塤謂之嘂塤燒土爲之大如鵝子銳上平底形如稱錘六孔小者如雞子大鐘謂之鏞書曰笙鏞以間亦名鑮音}
