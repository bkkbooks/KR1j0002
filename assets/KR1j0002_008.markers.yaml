  - {type: variant, offset: 0, length: 721, content: 釋天第八四時穹蒼蒼天也春為蒼天夏為昊天秋為旻天冬為上天祥春為青陽夏為朱明秋為白藏冬為玄英四氣和謂之玉燭春為發生夏為長嬴秋為收成冬為安寧四時和為通正謂之景風甘雨時降萬物以嘉謂之醴泉災穀不熟為饑蔬不熟為饉果不熟為荒仍饑為荐歲陽大歲在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰強圉在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰玄黓在癸曰昭陽大歲在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若歲名載歲也夏曰歲商曰祀周曰年唐虞曰載月陽月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極月名正月為陬二月為如三月為寎四月為余五月為皋六月為且七月為相八月為壯九月為玄十月為陽十一月為辜十二月為涂風雨南風謂之凱風東風謂之谷風北風謂之涼風西風謂之泰風焚輪謂之穨扶搖謂之猋風與火為庉迴風為飄日出而風為暴風而雨土為霾陰而風為曀天氣下地不應曰雺地氣發天不應曰霧霧謂之晦螮蝀謂之雩螮蝀虹也蜺為挈貳弇日為蔽雲疾雷為霆霓雨䨘為霄雪暴雨謂之涷小雨謂之霡霂久雨謂之淫淫謂之霖濟謂之霽星名壽星角亢也天根氐也天駟房也大辰房心尾也大火謂之大辰析木之津箕斗之間漢津也星紀斗牽牛也玄枵虛也顓頊之虛虛也北陸虛也營室謂之定娵觜之口營室東壁也降婁奎婁也大梁昴也西陸昴也濁謂之畢咮謂之柳柳鶉火也北極謂之北辰何鼓謂之牽牛明星謂之启明彗星為欃槍奔星為彴約祭名春祭曰祠夏祭曰礿秋祭曰嘗冬祭曰蒸祭天曰燔柴祭地曰瘞薶祭山曰庪縣祭川曰浮沈祭星曰布祭風曰磔是禷是禡師祭也既伯既禱馬祭也禘大祭也繹又祭也周曰繹商曰肜夏曰復胙講武春獵為蒐夏獵為苗秋獵為獮冬獵為狩宵田為獠火田為狩乃立冢土戎醜攸行起大事動大眾必先, SBCK: ''}
