  - {type: variant, offset: 419, length: 0, content: '', SBCK: 族叢釋蟲第十五螜天螻螻蛄也夏小正曰螜則鳴蜚蠦蜰蜰即􅀒盤臭蟲螾􅨪入耳蚰蜒蜩蜋蜩夏小正傳曰蜋蜩者五彩具螗蜩夏小正傳曰螗蜩者蝘俗呼爲胡蟬江南謂之螗􅡻音荑蚻蜻蜻如蟬而小方言云有文者謂之螓夏小正曰鳴蚻虎懸蠽茅蜩江東呼爲茅截似蟬而小青色蝒馬蜩蜩中最大者爲馬蟬蜺寒蜩寒螿也似蟬而小青赤月令曰寒蟬鳴蜓蚞螇螰即蝭螃也一名蟪蛄齊人呼螇螰蛣􅎙􅎙蜋黒甲蟲噉糞土蝎蛣􅔒木中蠧虫蠰齧桑似天牛長角體有白􅀧喜齧桑樹作孔入其中江東呼爲齧髮諸慮奚相未詳蜉蝣渠略似蛣蜣身狹而長有角黃黒色叢生糞土中朝生暮死豬好啖之蛂蟥蛢甲蟲也大如虎豆緑色今江東呼黃蛢音瓶蠸輿父守􅀲今􅀲中黃甲小蟲喜食􅀲葉故曰守􅀲蝚蛖螻蛖螻螻蛄􅀋不蜩王蚥未詳蛄䗐強䖹今米穀中蠹小黒蟲是也建平人呼爲䖹子音芈姓不過蟷蠰蟷蠰螗蜋別名其子蜱蛸一名􅡯蟭蟷蠰卵也蒺蔾蝍蛆似蝗而大腹長角能食虵腦蝝蝮蜪蝗子未有翅者外傳曰蟲舎蚔蝝蟋蟀蛬今促織也亦名青􅖹蟼蟆蛙􅀋蛝馬䗃馬蠲虳俗呼馬􅢡蛗螽蠜詩曰趯趯阜蟲草螽負蠜詩云喓喓草蟲謂常羊也蜤螽蜙蝑蜙䗥也俗呼蝽䗲蟿螽螇蚸今俗呼似蜙䗥而細長飛翅作聲者爲螇蚸土螽蠰谿似蝗而小今謂之土螼蚓蜸蚕即䖤蟺也江東呼寒蚓莫貈蟷蜋蛑螗蜋有斧蟲江東呼石蜋孫叔然以方言􅀃此義亦不了虰蛵負勞或曰即蜻蛉也江東呼狐䊍所未聞蜭毛蠹即蛓蟔蛅蟴蛓屬也今青州人呼蛓爲蛅蟴孫叔然云八角螫蟲失之蟠䑕負瓮器底蟲蟫白魚衣書中蟲一名蛃魚䖸羅􅁞䖸螒天雞小蟲黒身赤頭一名莎雞又曰樗雞傅負版未詳強蚚即強醜捋蜉螪何未詳螝蛹􅁞蝚蜆縊女小黒蟲赤頭喜自經死故曰縊女蚍蜉大螘俗呼爲馬蚍蜉小者螘齊人呼蟻蟻蛘蠪朾螘赤駮蚍蜉飛螘有翅其子蚳蚳蟻卵周禮曰蜃蚳醬次蟗䵹鼄䵹鼄鼄蝥今江東呼蝃蝥音掇土䵹鼄在地中布網者草䵹鼄絡幕草上者土蠭今江東呼大蠭在地中作房者爲土蠭啖其子即馬蠭今荆巴閒呼爲蟺音憚木蠭似土蠭而小在樹上作房江東亦呼爲木蠭又食其子蟦蠐螬在糞土中蝤蠐蝎在水中今雖通名爲蝎所在異􅢤威委黍舊􅀃䑕􅣁別名然所未詳蟰蛸長踦小䵹鼄長脚者俗呼爲喜子蛭蝚至掌未詳國貉蟲蠁今呼蛹蟲爲蠁廣推云土蛹蠁蟲蠖版蠖今蝍􅠸果臝蒲盧即細􅆎蠭也俗呼爲蠮螉螟蛉桑蟲俗謂之桑蟃亦曰戎女蝎桑蠹即蛣􅔒熒火即炤夜飛腹下有火密肌繼英未詳蚅烏蠋大蟲如指似􅁞見韓子蠓蠛蠓小蟲似蚋喜亂飛王蛈蝪即螘蝠似䵹鼄在穴中有蓋今河北人呼蛈蝪蟓桑繭食桑葉作繭者即今􅁞雔由樗繭食樗葉􅁄繭食棘葉欒繭食欒葉蚢蕭繭食蕭葉者皆􅁞􅀋翥醜鏬剖母背而生螽醜奮好奮迅作聲強醜捋以脚自摩捋蠭醜螸垂其􅃾蠅醜扇好揺翅食苗心}
