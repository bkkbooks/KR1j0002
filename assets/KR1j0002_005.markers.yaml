  - {type: variant, offset: 459, length: 0, content: '', krp: 脩長也釋器第六木豆謂之豆豆禮器也竹豆謂之籩籩亦禮器瓦豆謂之登即膏登也盎謂之缶盆也甌瓿謂之瓵瓿甊小甖長沙謂之瓵康瓠謂之甈瓠壺也賈誼曰寳康瓠是也斪斸謂之定屬斫謂之鐯钁也􅝁謂之疀皆古鍬鍤字緵罟謂之九罭九罭魚罔也今之百囊罟是亦謂之􅧡今江東呼爲緵嫠婦之笱謂之罶毛詩傳曰罶曲梁也謂以簿爲魚笱罺謂之汕今之橑罟篧謂之罩捕魚籠也槮謂之涔今之作槮者聚積柴木於水中魚得寒入其裏藏隱因以簿圍捕取之鳥罟謂之羅謂羅絡之兔罟謂之罝罝猶遮也見詩麋罟謂之罞冒其頭也彘罟謂之羉羉幕也魚罟謂之罛最大罟也今江東云繴謂之罿罿罬也罬謂之罦罦覆車也今之翻車也有兩轅中施罥以捕鳥展轉相解廣異語絇謂之救救絲以爲絇或曰亦罥名律謂之分律管可以分氣大版謂之業築牆版也繩之謂之縮之縮者約束之詩曰縮版以載彛卣罍器也皆盛酒尊彛其緫名小罍謂之坎罍形似壷大者受一斛衣裗謂之䘽衣縷也齊人謂之攣或曰袿衣之飾黼領謂之襮繡刺黼文以褗領縁謂之純衣縁飾也袕謂之褮衣開孔也衣眥謂之襟交領衱謂之裾衣後裾也衿謂之袸衣小帶佩衿謂之褑佩玉之帶上屬執衽謂之袺衣上衽扱衽謂之襭扱衣上衽於帶衣蔽前謂之襜今蔽膝也婦人之褘謂之縭縭緌也即今之香纓也褘邪交落帶繫於體因名爲褘緌繫也裳削幅謂之纀削殺其幅深衣之裳輿革前謂之鞎以韋靶車軾後謂之笰以韋靶後戸竹前謂之禦以簟衣軾後謂之蔽以簟衣後戸環謂之捐箸車衆環鑣謂之钀馬勒旁鐵載轡謂之轙車軛上環轡所貫也轡首謂之革轡靶勒見詩餀謂之餯說物臭也食饐謂之餲飯饖臭見論語摶者謂之糷飯相著米者謂之糪飯中有腥肉謂之敗臭壞魚謂之餒肉爛肉曰脫之剥其皮也今江東呼麋鹿之屬通爲肉魚曰斮之謂削鱗也冰脂也莊子云肌膚若冰雪冰雪脂膏也肉謂之羹肉臛也廣雅曰湆見左傳魚謂之鮨鮨鮓屬也見公食大夫禮肉謂之醢肉醤有骨者謂之臡雜骨醤見周禮康謂之蠱米皮澱謂之垽滓澱也今江東呼垽鼎絕大謂之鼐最大者圜弇上謂之鼒鼎斂上而小口附耳外謂之釴鼎耳在表款足者謂之鬲鼎曲脚也䰝謂之鬵詩曰漑之釡鬵鬵鉹也涼州呼鉹璲瑞也詩曰鞙鞙佩璲璲者玉瑞玉十謂之區雙玉曰㲄五㲄爲區羽本謂之翮鳥羽根也一羽謂之箴十羽謂之縛百羽謂之緷别羽數多少之名木謂之虡縣鐘磬之木植者名虡旄謂之藣旄牛尾也菜謂之蔌蔌者菜茹之揔名見詩白蓋謂之苫白茅苫也今江東呼爲盖黃金謂之璗其美者謂之鏐白金謂之銀其美者謂之鐐此皆道金銀之别名及精者鏐即紫磨金鉼金謂之鈑周禮曰祭五帝即供金鈑是也錫謂之鈏白鑞象謂之鵠角謂之犀謂之剒木謂之剫玉謂之雕左傳曰山有木工則剫之五者皆治樸之名金謂之鏤木謂之刻骨謂之切象謂之磋玉謂之琢石謂之磨六者皆冶器之名璆琳玉也璆琳美玉名簡謂之畢今簡札也不律謂之筆蜀人呼筆爲不律也語之變轉滅謂之點以筆滅字爲點絕澤謂之銑銑即美金言最有光澤也國語曰玦之以金銳者謂此也金鏃翦羽謂之鍭今之錍箭是也骨鏃不翦羽謂之志今之骨骲是也弓有縁者謂之弓縁者繳纏之即今宛轉也無縁者謂之弭今之角弓也左傳曰左執鞭弭以金者謂之銑以蜃者謂之珧以玉者謂之珪用金蚌玉飾弓兩頭因取其類以爲名珧小蚌珪大尺二寸謂之玠詩曰錫爾玠珪璋大八寸謂之琡璋半珪也璧大六寸謂之宣漢書所云瑄玉是也肉倍好謂之璧肉邊好孔好倍肉謂之瑗孔大而邊小肉好若一謂之環孔邊適等繸綬也即佩玉之組所以連繫瑞玉者因通謂之繸一染謂之縓今之紅也再染謂之赬淺赤三染謂之纁纁絳也青謂之葱淺靑黒謂之黝黝黒貌周禮曰隂祀用黝牲斧謂之黼黼文畫斧形因名云邸謂之柢根柢皆物}
