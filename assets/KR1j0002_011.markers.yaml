  - {type: variant, offset: 152, length: 1, content: 通, SBCK: 作者重見滸水厓水邊地水草交爲湄詩曰居河之湄濟有深渉渭濟渡之處深則厲淺則揭揭者揭衣也謂褰裳也以衣渉水爲厲衣謂禈繇膝以下爲揭繇􅂰以上爲渉繇帶以上爲厲繇自也濳行爲泳水底行也晏子春秋曰濳行逆流百歩順流七里汎汎楊舟紼縭維之紼􅛢也􅛢索縭緌也緌繫天子造舟比舩爲橋諸侯維舟維連四舩大夫方舟併兩舩士特舟單舩庶人乗泭併木以渡水注川曰}
