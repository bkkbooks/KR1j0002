  - {type: variant, offset: 147, length: 1, content: 澩, SBCK: 即此類也濫泉正出正出涌出也公羊傳曰直出直猶正也沃泉縣出縣出下出也從上溜下沈泉穴出穴出庂出也從旁出也湀闢流川通流過辨回川旋流灉反入即河水決岀復還入者河之有灉猶江之有沱潬沙出今江東呼水中沙堆爲潬音但汧出不流水泉潜出便自停成汙池歸異出同流肥毛詩傳曰所出同所歸異爲肥瀵大出尾下今河東汾隂縣有水口如車輪許濱沸漏出其深無限名之爲瀵馮翊郃陽縣復有瀵亦如之相去數里而夾河河中陼上又有一瀵瀵源皆潛相通在汾隂者人壅其流以爲陂種稻呼其本所出處爲瀵魁此是也尾猶底也水醮曰厬謂水醮盡水自河出爲灉書曰灉沮會同濟爲濋汶爲瀾洛爲波漢爲濳書曰沱潜旣道淮爲滸江爲沱書曰岷}
