  - {type: variant, offset: 11, length: 4, content: 否為瀸井, SBCK: 名蟾蠩蘭今江東呼豨首可以煼􅅙蛹荓馬帚似蓍可以爲掃蔧藱懷羊未詳茭牛蘄今馬蘄葉細銳似芹亦可食葖蘆萉萉冝爲菔蘆菔蕪菁屬紫華大根俗呼雹葖淔耳漢和帝時任城生黑黍或三四實實二米得黍三斛八斗是稌稻今沛國呼稌葍藑茅葍華有赤者爲藑藑葍}
