  - {type: variant, offset: 9, length: 1, content: 見, SBCK: 名山薊今术似薊而生山中楊枹薊似薊而肥大今呼之馬薊葥王蔧王帚也似藜其樹可以爲埽蔧江東呼之曰落帚菉王芻菉蓐也今呼鴟脚莎拜蔏藋蔏藋亦似藜蘩皤蒿白蒿蒿菣今人呼青蒿香中炙啖者爲菣蔚牡菣無子者齧彫蓬薦黍蓬別蓬種類􅤴䑕莞亦莞屬也纎細似龍須可以爲席蜀中出好者葝䑕尾可以染皂菥􅕴大薺似薺葉細俗呼之曰老薺蒤虎杖似紅草而麤大有細刺可以染赤孟狼尾似茅今人亦以覆屋瓠棲瓣瓠中瓣也詩云齒如瓠棲茹藘茅蒐今之蒨也可以染絳果臝之實栝樓今齊人呼之爲天􅀲荼苦菜詩曰誰謂荼苦苦菜可食萑蓷今茺蔚也葉似荏方莖白華華生節閒又名益母廣雅云虉綬小草有雜色似綬粢稷今江東人呼粟爲粢衆秫謂黏粟也戎叔謂之荏菽即胡豆也卉草百草揔名萒雀弁未詳蘥雀麥即燕麥也蘹烏薞萰菟荄蘩菟蒵皆未詳蔩菟􅀲莬􅀲似上􅀲茢薽豕首本草曰􅇾盧}
  - {type: page-break, offset: 9, content: '', id: KR1j0002_SBCK_012-1b}
