  - {type: variant, offset: 297, length: 0, content: '', SBCK: 一名軒于江東呼莤音猶蓾蔖作履苴草柱夫揺車蔓生細葉紫華可食今俗呼曰翹揺車出隧蘧􅂼蘧􅂼似土菌生菰草中今江東啖之甜滑音氊氍㲣蘄茝蘪蕪香草葉小如萋狀淮南子云似蛇牀山海經云臭如蘪蕪茨蒺蔾布地蔓生細葉子有三角刺人見詩蘮蒘竊衣似芹可食子大如麥兩兩相合有毛著人衣髦顚蕀細葉有刺蔓生一名商蕀廣雅云女木也雚芄蘭雚芄蔓生斷之有白汁可啖􅙛莐藩生山上葉如韭一曰㮛母蕍蕮今澤蕮蔨鹿􅓂其實莥今鹿豆也葉似大豆根黄而香蔓延生薃侯莎其實媞夏小正曰薃也者莎䔺媞者其實莞苻蘺其上蒚今西方人呼蒲爲莞蒲蒚謂其頭臺首也今江東謂之苻蘺西方亦名蒲中莖爲蒚用之爲席音羽翮荷芙渠别名芙蓉江東呼荷其莖茄其葉蕸其本蔤莖下白蒻在泥中者其華菡萏見詩其實蓮蓮謂房也其根藕其中的蓮中子也的中薏中心苦紅蘢古其大者蘬俗呼紅草爲蘢鼓語轉耳蒫薺實薺子名黂枲實禮記曰苴麻之有黂枲麻别二名須薞蕪薞蕪似羊蹄葉細味酢可食菲蒠菜菲草生下溼地似蕪菁華紫赤色可食蕢赤莧今之莧赤莖者蘠蘼虋冬門冬一名滿冬本草云萹苻止未詳濼貫衆葉貟銳莖毛黑布地冬不死一名貫渠廣雅云貫節莙牛薻似薻葉大江東呼爲馬薻蓫薚馬尾廣雅曰馬尾蔏陸本草云别名薚今􅀜西亦呼爲薚江東呼爲當陸萍蓱}
