  - {type: variant, offset: 300, length: 1, content: 居, SBCK: 淋以爲飲藚牛脣毛詩傳曰水蕮也如藚斷寸寸有節抜之可復苹藾蕭今藾蒿也初生亦可食連異翹一名連苕又名連草本草云澤烏薞即上蘾也傅横目一名結縷俗謂之鼔箏草釐蔓華一名蒙華蓤蕨攗蓤今水中芰大菊蘧麥一名麥句薑即瞿麥薜牡未詳葥山莓今之木莓也實似藨莓而大亦可食齧苦蓳今蓳葵也葉似栁子如米汋食之滑藫石衣水苔也一名石髮江東食之或曰藫葉似䪥而大生水底亦可食蘜治蘠今之秋華菊唐蒙女蘿女蘿菟絲别四名詩云爰采唐矣苗蓨未詳茥蒛葐覆葐也實似莓而小亦可食芨蓳草即烏頭也江東呼爲蓳音靳虃百足未詳菺戎葵今蜀葵也似葵華如木槿華蘻狗毒樊光云俗語苦如蘻垂比葉未詳蕧盜庚旋蕧似菊茡麻母苴麻盛子}
