  - {type: variant, offset: 299, length: 0, content: '', SBCK: 浮蓱江東謂之薸音瓢其大者蘋詩曰于以采蘋莃菟葵頗似葵而小葉狀如藜有毛汋啖之滑芹楚葵今水中芹菜藬牛蘈今江東呼草爲牛蘈者高尺餘許方莖葉長而銳有穗穗間有華華紫縹色}
