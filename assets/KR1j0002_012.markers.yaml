  - {type: variant, offset: 305, length: 1, content: 洲, SBCK: 者菌大小異名菆小葉未聞苕陵苕一名陵時本草云黃華蔈白華茇苕華色異名亦不同音沛蘪從水生生於水中薇垂水生於水邊薜山麻似人家麻生山中莽數節竹類也節間促桃枝四寸有節今桃枝節間相去多四寸粼堅中竹類也其中實簢筡中言其中空竹類仲無笐亦竹類未詳䈚箭萌萌筍屬也周禮}
  - {type: variant, offset: 305, length: 1, content: 洲, krp: 者菌大小異名菆小葉未聞苕陵苕一名陵時本草云黃華蔈白華茇苕華色異名亦不同音沛蘪從水生生於水中薇垂水生於水邊薜山麻似人家麻生山中莽數節竹類也節間促桃枝四寸有節今桃枝節間相去多四寸粼堅中竹類也其中實簢筡中言其中空竹類仲無笐亦竹類未詳䈚箭萌萌筍屬也周禮}
  - {type: variant, offset: 307, length: 1, content: 渚, SBCK: 葅鴈醢篠箭別二名枹霍首素華軌鬷皆未詳芏夫王芏草生海邊似莞藺今南方越人采以爲席藄月爾即紫藄也似蕨可食葴馬藍今大葉冬藍也姚莖涂薺未詳芐地黃一名地髓江東呼芐音怙蒙王女蒙即唐也女蘿別名拔蘢葛似葛蔓生有節江東呼爲龍尾亦謂之虎葛細葉赤莖藗牡茅白茅屬菤耳苓耳廣雅云枲耳也亦云胡枲江東呼爲常枲或曰苓耳形似䑕耳叢生如盤蕨􅣀廣雅云紫藄非也初生無葉可食江西謂之􅣀蕎邛鉅今藥草大㦸也本草云繁由胡未詳莣杜榮今莣草似茅皮可以爲繩索履屩也稂童􅆝稂莠類也藨麃麃即莓也今江東呼爲藨莓子似覆葐而大赤酢甜可啖的薂即蓮實也購蔏蔞蔏蔞蔞蒿也生下田初出可啖江東用羮魚茢勃茢一名石芸本草云葽繞蕀蒬今逺莣也似麻黃赤華葉銳而黃其上謂之}
