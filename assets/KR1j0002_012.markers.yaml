  - {type: variant, offset: 302, length: 0, content: '', SBCK: 瓝九葉今江東有草五葉共叢生一莖俗因名爲五葉即此類也藐茈草可以染紫一名茈䓞廣雅云􅀝商活脫即離南也蘵黃蒢蘵草葉似酸漿草小而白中心黃江東以作葅食藒車芞輿藒車香草見離騷權黃華今謂牛芸草爲黃華華黃葉似苜蓿葞春草一名芒草本草云蔠葵蘩露承露也大莖小葉華紫黃色菋荎藸五味也蔓生子叢在莖頭蒤委葉詩云以茠蒤蓼皇守田似燕麥子如彫胡米可食生廢田中一名守氣鉤藈姑鉤􅕕也一名王􅀲實如瓝􅀲正赤味苦望椉車可以爲索長丈餘困衱袶未詳攫烏階即烏杷也子連相著狀如杷齒可以染皂杜土鹵杜衡也似葵而香盱虺牀蛇牀也一名馬牀廣雅云蔝蔜未聞赤􅂁薊即上枹薊菟奚顆涷􅅃涷也紫赤華生水中中馗菌地蕈也似蓋今江東名爲土菌亦}
  - {type: page-break, offset: 302, content: '', id: KR1j0002_SBCK_012-4b}
