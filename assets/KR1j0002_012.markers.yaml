  - {type: variant, offset: 16, length: 0, content: '', SBCK: 種耳亦猶菱苕華黃白異名臺夫須鄭箋詩云臺可以爲禦雨笠藆藅未詳莔貝母根如小貝貟而白華葉似韭荍蚍衃今荆葵也似葵紫色謝氏云小草多華少葉葉又翹起艾冰臺今艾蒿蕇亭歷實葉皆似芥一名狗薺廣雅云音典苻􅀑目今江東}
