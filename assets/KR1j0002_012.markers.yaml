  - {type: variant, offset: 344, length: 25, content: 曲千里一曲一直九河徒駭太史馬頰覆鬴胡蘇𥳑絜鉤盤鬲津, SBCK: 實中江東呼爲烏蓲音丘其萌虇今江東呼蘆笋爲虇然則萑葦之􅀋其初生者皆名虇音繾綣蕍芛葟華榮釋言云華皇也今俗呼草木華初生者爲芛音䝐豬蕍猶敷蕍亦華之貌所未聞卷施草拔心不死宿莽也離騷云荺茭今江東呼藕紹緒如指空中可啖者爲茭茭即此􅀋荄根別二名俗呼韭根爲荄攫橐含未詳華荂也今江東呼華爲荂音敷華荂榮也轉相解木謂之華草}
