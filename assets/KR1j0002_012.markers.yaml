  - {type: variant, offset: 318, length: 12, content: 為為潏河曲河出崑崙虛色白, SBCK: 帶糾青絲綸組綬也海中草生彩理有象之者因以名云帛似帛布似布華山有之草葉有象布帛者因以名云生華山中苀東蠡未詳緜馬羊齒草細葉葉羅生而毛有似羊齒今江東呼爲鴈齒繅者以取繭緒萿麋舌今麋舌草春生葉有似於舌搴柜朐未詳蘩之醜秋爲蒿醜類也春時各有種名至秋老成皆通呼爲蒿芺薊其實荂芺與薊莖頭皆有蓊臺名荂荂即其實音俘蔈荂荼即芀猋藨芀皆芀荼之别名方俗異語}
