body:
  text: 釋草第十三蒮山韭茖山蔥葝山薤蒚山蒜薜山蘄椴木槿櫬木槿朮山薊楊枹薊葥王蔧菉王芻拜蔏藋蘩皤蒿蒿菣蔚牡菣齧雕蓬薦黍蓬萆鼠莞葝鼠尾菥蓂大薺蒤虎杖孟狼尾瓠棲瓣茹藘茅搜果裸之實栝樓荼苦菜萑蓷虉綬粢稷衆秫戎叔謂之荏菽卉草萒雀辨蘥雀麥蘾烏蕵萰菟荄蘩菟蒵蔩菟瓜茢薽豕首荓馬帚藱懷羊茭牛蘄葖蘆萉淔灌苬芝筍竹萌簜竹莪蘿苨菧苨絰履莕接余其葉苻白華野菅薜白蘄菲芴葍葍熒委萎葋艼熒竹萹蓄葴寒漿薢茩芵茪莁荑蔱蘠瓞瓝其紹瓞芍鳧茈蘱薡蕫蕛苵鉤芺薤鴻薈蘇桂荏薔虞蓼蓧蓨虋赤苗芑白苗秬黑黍秠一稃二米稌稻葍藑茅臺夫須藆藅莔貝母荍蚍衃艾冰臺蕇亭歷苻鬼目薜庾草蔜𧃒離南活莌蘢天蘥須葑蓯蒡隱荵莤蔓于蓾蔖柱夫搖車出隧蘧蔬蘄茝蘪蕪茨蒺藜蘮蒘竊衣髦顛蕀雚芄蘭𧂇莐藩蕍蕮蔨鹿藿其實莥薃侯莎其實媞莞苻蘺其上蒚荷芙渠其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中的的中薏紅蘢古其大者蘬蒫薺實黂枲實枲麻須蕵蕪菲蒠菜蕢赤莧蘠蘼虋冬萹苻止濼貫衆莙牛薻蓫薚馬尾蘋蓱其大者蘋莃菟葵芹楚葵藬牛蘈藚牛脣蘋藾蕭連異翹澤烏蕵傅橫目釐蔓華菱蕨攗大菊蘧麥薜牡𧄽葥山莓齧苦堇藫石衣蘜治蘠唐蒙女蘿女蘿菟絲苗蓨茥蒛葐芨堇草虃百足菺戎葵蘻狗毒垂比葉蕧盜庚茡麻母瓝九葉藐茈草倚商活脫蘵黃蒢藒車芞輿權黃華葞春草蔠葵蘩露菋荎藸蒤委葉皇守田鉤藈姑望乘車困衱袶攫烏階杜土鹵盱虺床蔝蔜赤枹薊菟奚顆涷中馗菌小者菌𦯍小葉苕陵苕黃華蔈白華茇蘪從水生薇垂水薜山麻莽數節桃枝四寸有節粼堅中簢筡中仲無笐箈箭萌篠箭枹霍首素華軌鬷芏夫王藄月爾葴馬藍姚莖塗薺芐地黃蒙王女拔蘢葛藗牡茅菤耳苓耳蕨虌蕎邛巨繁由胡莣杜榮稂童粱藨麃的薂購蔏蔞茢勃茢葽繞蕀蒬茦刺蕭萩𧂇海薻長楚銚芅蘦大苦芣苡馬舄馬舄車前綸似綸組似組東海有之帛似帛布似布華山有之苀東蠡綿馬羊齒萿麋舌搴匱朐蘩之醜秋為蒿芺薊其實荂蔈荂荼猋藨芀葦醜芀葭華蒹薕葭蘆菼薍其萌虇蕍芛葟華榮卷施草拔心不死荺茇荄根攫橐含華荂也華荂榮也木謂之華草謂之榮不榮而實者謂之秀榮而不實者謂之英
