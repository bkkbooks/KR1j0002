body:
  text: 釋言第二殷齊中也斯誃離也謖興起也還復返也宣徇徧也馹遽傳也蒙荒奄也告謁請也肅噰聲也格懷來也畛厎致也恀怙恃也律遹述也俞畣然也豫臚敘也庶幾尚也觀指示也若惠順也敖幠傲也幼鞠稚也逸諐過也疑休戾也疾齊壯也悈褊急也貿賈市也厞陋隱也遏遾逮也征邁行也圮敗覆也荐原再也撫敉撫也臞脙瘠也桄熲充也屢暱亟也靡罔無也爽差也爽忒也佴貳也劑翦齊也饙餾稔也媵將送也作造為也餥餱食也鞫究窮也滷矜鹹苦也干流求也流覃也覃延也佻偷也潛深也潛深測也穀鞠生也啜茹也茹虞度也試式用也誥誓謹也競逐彊也禦圉禁也窒薶塞也黼黻彰也膺身親也愷悌發也髦士官也畯農夫也蓋割裂也邕支載也諈諉累也漠察清也庇庥廕也穀履祿也履禮也隱占也逆迎也憯曾也增益也窶貧也薆隱也僾唈也基經也基設也祺祥也祺吉也兆域也肈敏也挾藏也浹徹也替廢也替滅也速徵也徵召也琛寶也探試也髦選也髦俊也俾職也紕飾也淩慄也慄慼也蠲明也茅明也明朗也猷圖也猷若也偁舉也偁好也次律銓也矢誓也舫舟也泳游也迨及也冥幼也降下也傭均也彊暴也宨肆也肆力也俅戴也瘞幽也氂罽也烘燎也煁烓也陪朝也康苛也樊藩也賦量也粻糧也庶侈也庶幸也筑拾也奘駔也集會也舫泭也洵均也洵𪚕也逮遝也是則也畫形也賑富也局分也懠怒也僁聲也葵揆也揆度也逮及也惄飢也眕重也獵虐也土田也戍遏也師人也硞鞏也棄忘也囂閑也謀心也獻聖也里邑也襄除也振古也懟怨也縭介也號謼也凶咎也苞稹也逜寤也顁題也猷肯可也務侮也貽遺也貿買也賄財也甲狎也菼騅也菼薍也粲餐也渝變也宜肴也夷悅也顛頂也耋老也輶輕也俴淺也綯絞也訛化也跋躐也疐跲也烝塵也戎相也飫私也孺屬也幕暮也煽熾也熾盛也柢本也窕閒也淪率也罹毒也檢同也郵過也遜遯也斃踣也憤僵也畛殄也曷盍也虹潰也隌闇也䵑膠也孔甚也厥其也戛禮也闍臺也囚拘也攸所也展適也鬱氣也宅居也休慶也祈叫也濬幽深也哲智也弄玩也尹正也皇匡正也服整也聘問也愧慚也殛誅也克能也翌明也訩訟也晦冥也奔走也逡退也疐仆也亞次也諗念也屆極也弇同也弇蓋也恫痛也握具也振訊也鬩恨也越揚也對遂也燬火也懈怠也宣緩也遇偶也曩曏也偟暇也宵夜也懊忨也愒貪也榰柱也裁節也竝併也卒既也慒慮也將資也黹紩也遞迭也矧況也廩廯也逭逃也訊言也間俔也沄沆也干扞也趾足也䠊刖也襄駕也忝辱也燠煖也塊堛也將齊也餬饘也啟跪也矏密也開闢也袍襺也障畛也靦姡也鬻糜也舒緩也翢纛也纛翳也隍壑也芼搴也典經也威則也苛妎也芾小也迷惑也狃復也逼迫也般還也班賦也濟渡也濟成也濟益也緡綸也辟歷也漦盝也寬綽也袞黻也華皇也昆後也彌終也
