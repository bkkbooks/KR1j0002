seq: 10
front:
  text: 魁梧桀大者五但未詳其名號今者所在耳
  hash: sha256:141603e751352e7585706a1e29517aec0dbdac272ec6955217914a56b79bdc13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0002_SBCK_010-1a}
body:
  text: 丘望厓洒而髙岸厓水邊洒謂深也視厓峻而水深者曰岸夷上洒下不漘厓上平坦而下水深者爲漘不發聲隩隈今江東呼爲浦隩淮南子曰漁者不爭隈厓内爲隩外爲隈别厓表裏之名畢堂牆今終南山道名畢其邊若堂之牆重厓岸兩厓累者爲岸岸上滸岸上地墳大防謂隄涘爲厓謂水邊窮瀆汜水無所通者谷者溦通於谷厓岸釋山第十一河南華華隂山河西嶽吴嶽河東岱岱宗泰山河北􅁪北嶽􅁪山江南衡衡山南嶽山三襲陟襲亦重再成英兩山相重一成坯書曰至于太伾山大而髙崧今中嶽嵩高山蓋依此名山小而髙岑言岑崟銳而髙嶠言鐵峻卑而大扈扈廣貌小而衆巋小山叢羅小山岌大山峘岌謂髙過屬者嶧言駱驛相連屬獨者蜀蜀亦􅀌獨上正章山上平宛中隆山中央髙山脊岡謂山長脊未及上翠微近上旁陂山頂冢山巔崒者厜㕒謂山峯頭巉巖山如堂者密形似堂室者尸子曰松柏之䑕不知堂密之有美樅如防者盛防隄巒山嶞謂山形長狹者荆州謂之巒詩曰嶞山喬嶽重甗隒謂山形如累兩甗甗甑山狀似之因以名云左右有岸厒夾山有岸大山宫小山霍宫謂圍繞之禮記曰君爲廬宫之是也小山别大山鮮不相連山絕陘連山中斷絕多小石磝多礓礫多大石礐多盤石多草木岵無草木峐皆見詩山上有水埒有停泉夏有水冬無水澩有停潦山豄無所通谿所謂窮瀆者雖無所通與水注川同名石戴土謂之崔嵬石山上有土者土戴石爲砠土山上有石者山夾水澗陵夾水澞别山陵間水者之名山
