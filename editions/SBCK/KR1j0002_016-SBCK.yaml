body:
  text: 寶􅀛書曰遺我大寶􅀛五曰文􅀛甲有文彩者河圖曰靈􅀛負書丹甲青文六曰筮􅀛常在著叢下潜伏見􅀛䇿傳七曰山􅀛八曰澤􅀛九曰水􅀛十曰火􅀛此皆􅀃􅀛生之處所火􅀛猶火䑕耳物有含異氣者不可以常理推然亦無所怪釋鳥第十七隹其鳺鴀今䳕鳩鶌鳩鶻鵃似山鵲而小短尾青黒色多聲今江東亦呼爲鶻鵃鳲鳩鴶鵴今之布穀也江東呼爲穫穀鷑鳩鵧鷑小黒鳥鳴自呼江東名爲鳥鳴鴡鳩王鴡鵰􅀋今江東呼之爲鶚好在江渚山邊食魚毛詩傳曰鳥摯而有别鵅鵋䳢今江東呼鵂鶹爲鵋䳢亦謂之鴝鵅音格鶅鵵軌未詳鴗天狗小鳥也青似翠食魚江東呼爲水狗鷚天鸙大如鷃雀色似鶉好髙飛作聲今江東名之天鷚音綢繆鵱鷜鵝今之野鵝鶬麋鴰今呼鶬鴰鵅烏􅖂水鳥也似鶂而短鵛腹翅紫白背上緑色江東呼烏􅖂音駮舒鴈鵝禮記曰出如舒鴈今江東呼􅕯音加舒鳧鶩鴨也鳽鵁鶄似鳧脚髙毛冠江東人家養之以厭火災輿鵛鷋未詳鵜鴮鸅今之鵜鶘也好羣飛沈水食魚故名洿澤俗呼之爲淘河鶾天鷄鶾鷄赤羽逸周書曰文鶾若彩鷄成王時蜀人獻之鷽山鵲似鵲而有文彩長尾觜脚赤鷣負雀鷣鷂也江南呼之爲鷣善捉雀因名云音淫齧齒艾未詳鶨䳢老鴒鶨也俗呼爲癡鳥鳸鴳今鴳雀桑鳸竊脂俗謂之青雀觜曲食肉好盗脂膏因名云鳭鷯剖葦好剖葦皮食其中蟲因名云江東呼蘆虎似雀青班長尾桃蟲鷦其雌鴱鷦􅛯桃雀也俗呼爲巧婦鶠鳳其雌皇瑞應鳥鷄頭蛇頸燕頷􅀛背魚尾五彩色其髙六尺許䳭鴒雝渠雀屬也飛則鳴行則揺鸒斯鵯鶋雅烏也小而多羣腹下白江東亦呼爲鵯烏音匹燕白脰烏脰頸鴽鴾母鸙也青州呼鴾母密肌繫英釋蟲以有此名疑誤重巂周子巂鳥出蜀中燕燕鳦詩云燕燕于飛一名􅀇鳥齊人呼鳦鴟鴞鸋鴂鴟􅀋狂茅鴟今􅣽鴟也似鷹而白怪鴟即鴟鵂也見廣雅今江東通呼此屬爲怪鳥梟鴟土梟鶛劉疾未詳生哺鷇鳥子須母食之生噣雛能自食爰居雜縣國語曰海鳥爰居漢元帝時琅邪有大鳥如馬駒時人謂之爰居春鳸鳻鶞夏鳸竊􅀇秋鳸竊藍冬鳸竊黃桑鳸竊脂􅁄鳸竊丹行鳸唶唶宵鳸嘖嘖諸鳸皆因其毛色音聲以爲名􅀼藍青色鵖鴔戴鵀鵀即頭上勝今亦呼爲戴勝鵖鴔猶鶝語聲轉耳鶭澤虞今婟澤鳥似水鴞蒼黒色常在澤中見人輒鳴喚不去有象主守之官因名云俗呼爲護田鳥鶿鷧即鸕鶿也觜頭曲如鈎食魚鷯鶉其雄鶛牝痺鴞䳺屬鸍沈鳧似鴨而小長尾背上有文今江東亦呼爲鸍音施鴢頭鵁似鳧脚近尾略不能行江東謂之魚鵁音髐箭鵽鳩宼雉鵽大如鴿似雌雉䑕脚無後指岐尾爲鳥愍急羣飛出北方沙漠地萑老鵵木兎也似鴟鵂而小兎頭有角毛脚夜飛好食鷄鶟鶦鳥似雉青身白頭狂㝱鳥狂鳥五色有冠見山海經皇黃鳥俗呼黃離留亦名摶黍翠鷸似燕紺色生鬱林鸀山烏似烏而小赤觜穴乳出西方蝙蝠服翼齊人呼爲蟙䘃或謂之仙䑕晨風鸇鷂屬詩曰鴪彼晨風鸉白鷢似鷹尾上白寇雉泆泆即鵽鳩也鷆蟁母似烏􅖂而大黃白雜文鳴如鴿聲今江東呼爲蚊母俗􅀃此鳥常吐蚊故以名云鷉須鸁鷉鷿鷉似鳧而小膏中瑩刀鼯䑕夷由狀如小狐似蝙蝠􅁏翅翅尾項脅毛紫赤色背上蒼艾色腹下黃喙頷雜白脚短爪長尾三尺許飛且乳亦謂之飛生聲如人呼食火煙能從髙赴下不能從下上髙倉庚商庚即鵹黃也鳺餔敊未詳鷹鶆鳩鶆當爲字之誤耳左傳作鳩是也鶼鶼比翼􅀃已在上鵹黃楚雀即倉庚也鴷斵木口如錐長數寸常斵樹食蟲因名云鸄鶶鷵似烏蒼白色鸕諸雉未詳或云即今雉鷺舂鉏白鷺也頭翅背上皆有長翰毛今江東人取以爲睫攡名之曰白鷺縗鷂雉青質五彩鷮雉即鷮雞也長尾走且鳴鳪雉黃色鳴自呼鷩雉似山雞而小冠背毛黃腹下赤項緑色鮮明秩秩海雉如雉而黒在海中山上鸐山雉長尾者雗雉鵫雉今白鵫也江東呼白雗亦名白雉雉絶有力奮最健􅃲伊洛而南素質五采皆備成章曰翬翬亦雉屬言其毛色光鮮江淮而南青質五采皆備成章曰鷂即鷂雉也南方曰􅔧東方曰鶅北方曰鵗西方曰鷷􅀃四方雉之名鳥䑕同穴其鳥爲鵌其䑕爲鼵鼵如人家䑕而短尾鵌似鵽而小黃黒色入地三四尺䑕在内鳥在外今在隴西首陽縣鳥䑕同穴山中孔氏尚書傳云共爲雄雌張氏地理記云不爲牝牡
