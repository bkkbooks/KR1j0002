seq: 3
front:
  text: 小跽矏密也謂緻密開闢也書曰闢四門袍襺也左傳曰重襺衣裘障畛也謂壅障靦姡也面姡然鬻糜也淖糜舒緩也謂遲緩翢纛也今之羽葆幢纛翳也舞者所以自蔽翳隍壑也城池空者爲壑芼搴也謂拔取菜典經也威則也威儀可法則苛妎也煩苛者多嫉妎芾小也芾者小貌迷惑也狃復也狃􅏸復爲逼迫也般還也左傳曰般馬之聲班賦也謂布與濟渡也濟成也濟益也所以廣異訓各隨事爲義緍綸也詩曰維絲伊緍緡繩也江東謂之綸辟歷也未詳漦盝也漉漉出涎沫寛綽也謂寛􅁉也衮黻也衮衣有黻文華皇也釋草曰葟華榮昆後也謂先後方俗語彌終也终竟也釋訓第三明明斤斤察也皆聦明鑒察條條秩秩智也皆智思深長穆穆肅肅敬也皆容儀謹敬諸諸便便辯也皆言辭辯給肅肅翼翼恭也皆恭敬廱廱優優和也皆和樂兢兢憴憴戒也皆戒愼戰戰蹌蹌動也皆恐動趨歩晏晏温温柔也皆和柔業業翹翹危也皆懸危惴惴憢憢懼也皆危懼番番矯矯勇也皆壯勇之貌􅁊􅁊烈烈威也皆嚴猛之貌洸洸赳赳武也皆果毅之貌藹藹濟濟止也皆賢士盛多之容止悠悠洋洋思也皆憂思蹶蹶踖踖敏也皆便速敏捷薨薨増増衆也皆衆夥之貌烝烝遂遂作也皆物盛興作之貌委委佗佗美也皆佳麗美豔之貌忯忯惕惕愛也詩云心焉惕惕韓詩以爲恱人故言愛也忯忯未詳偁偁格格舉也皆舉持物蓁蓁孽孽戴也皆頭戴物懕懕媞媞安也皆好人安詳之容祁祈遟遟徐也皆安徐丕丕􅂤􅂤大也皆多大存存萌萌在也萌萌未見所出懋懋慔慔勉也皆自勉強庸庸慅慅勞也皆劬勞也赫赫躍躍迅也皆盛疾之貌綽綽爰爰緩也皆寛緩也悠悠偁偁丕丕簡簡存存懋懋庸庸綽綽盡重語坎坎墫墫喜也皆鼓無懽喜瞿瞿休休儉也皆良士節儉旭旭蹻蹻憍也皆小人得志憍蹇之貌夢夢訰訰亂也皆闇亂懪懪邈邈悶也皆煩悶儚儚洄洄惛也皆迷惛版版盪盪僻也皆邪僻爞爞炎炎薰也皆旱熱薫炙人居居究究惡也皆相憎惡仇仇敖敖傲也皆傲慢賢者佌佌瑣瑣小也皆才器細陋悄悄慘慘愠也皆賢人愁恨痯痯瘦瘦病也皆賢人失志懷憂病也殷殷惸惸忉忉慱慱欽欽京京忡忡惙惙怲怲弈弈憂也此皆作者歌事以詠心憂畇畇田也言墾辟也畟畟耜也言嚴利郝郝耕也言土解繹繹生也言種調穟穟苗也言茂好也緜緜穮也言芸精挃挃穫也刈禾聲栗栗衆也積聚緻溞溞淅也洮米聲烰烰烝也氣出盛俅俅服也謂戴弁服峨峨祭也謂執圭璋助祭鍠鍠樂也鐘鼓音穰穰福也言饒多子子孫孫引無極也丗丗昌盛長無窮顒顒卬卬君之德也道君人者之德望丁丁嚶嚶相切直也丁丁斫木聲嚶嚶兩鳥鳴以喻朋友切磋相正藹藹萋萋臣盡力也梧桐茂賢士衆地極化臣竭忠噰噰喈喈民協服也鳯凰應徳鳴相和百姓懷附興頌歌佻佻契契愈遐急也賦役不均小國困竭賢人憂歎逺益急切宴宴粲粲尼居息也盛飾宴安近處優閑哀哀悽悽懐報德也悲苦征役思所生也儵儵嘒嘒罹禍毒也悼王道􅁾塞羡蟬鳴自得傷已失所遭䜛賊晏晏旦旦悔爽忒也傷見􅅸弃恨士失也皐皐㻆㻆刺素食也譏無功德尸寵禄也懽懽愮愮憂無告也賢者憂懼無所訴也憲憲􅂥􅂥制法則也佐興虐政設敎今也謔謔謞謞崇讒慝也樂禍助虐増譛惡也翕翕訿訿莫供職也賢者陵替姦黨熾背公恤私曠職事速速蹙蹙惟逑鞫也陋人專禄國侵削賢士永哀念窮迫抑抑密也威儀審諦秩秩淸也德音淸泠甹夆掣曵也謂牽拕朔北方也謂幽朔不俟不來也不可待是不復來不遹不蹟也言不循􅁤跡也不徹不道也徹亦道也勿念勿忘也勿念念也萲諼忘也義見伯兮考盤詩毎有雖也詩曰毎有良朋辭之雖也饎酒食也猶今云饎饌皆一語而兼通舞號雩也雩之祭舞者吁嗟而請雨曁不及也公羊傳曰及我欲之曁不得巳曁不得巳是不得及蠢不遜也蠢動爲惡不謙遜也如切如磋道學也骨象須切磋而为器人須學問以成徳如琢如磨自脩也玉石之被雕磨猶人自脩飾瑟兮僩兮恂慄也􅁪戰竦赫兮烜兮威儀也貌光宣有斐君子終不可諼兮斐文貌道盛德至善民之不能忘也常思詠旣微且尰骭􅅑爲微腫足爲尰骭脚脛瘍瘡是刈是穫鑊煑之也煑􅁑爲絺綌履帝武敏武迹也敏拇也拇迹大指處張仲孝友周宣王時賢臣善父母爲孝善兄弟爲友有客宿宿言再宿也有客信信言四宿也再宿爲信重言之故知四宿美女爲媛所以結好媛美士爲彦人所彦詠其虚其徐威儀容止也雍容都雅之貌猗嗟名兮目上爲名眉眼之閒式微式微者微乎微者也言至微之子者是子也斥所詠徒御不驚輦者也歩挽輦車襢裼肉袒也脫衣而見體暴虎徒搏也空手執也馮河徒渉也無舟楫籧篨口柔也籧篨之疾不能俯口柔之人視人顔色常亦不伏因以名云戚施面柔也戚施之疾不能仰面柔之人常俯似之亦以名云夸毗體柔也屈己卑身以柔順人也婆娑舞也舞者之容擗拊心也謂椎胷也矜憐撫掩之也撫掩猶撫拍謂慰恤也緎羔裘之縫也縫飾羔皮之名殿屎呻也呻吟之聲幬謂之帳今江東亦謂帳爲幬侜張誑也書曰無或侜張爲幻爾雅音釋卷下釋草第十三蒮育韭九茖革葱忩葝巨盈䪥薤蒚力薜百蘄芹椵叚堇謹櫬襯薊計枹孚葥箭蔧邃菉緑蔏啇藋徒的蘩煩皤婆菣去刄蔚尉􅤴方寐莞官菥惜蓂覓蒤途瓠戸故瓣方莧茹如藘力居臝力果萑隹蓷他回虉逆粢咨衆終秫述菽叔萒恱轉蘥藥蘾戸怪薞孫萰練菟兔荄核蒵􅀆蔩演茢列薽眞豕傷氏荓瓶藱胡罪葖他忽蘆羅萉蒲北淔勑苬囚簜蕩苨禰菧底絰侍節菅姦菲匪芴物葍福䔰富萎威葋劬艼他丁熒廻萹匹善葴針薢皆茩狗芵決茪光莁巫荑夷蔱殺蘠牆􅚩大結瓝步角芍戸了蘱􅀋薡鼎蕫董蕛啼苵大結薈㑹蓼了蓧他凋蓨愓虋門芑起秠孚鄙稃敷稌杜藑瓊夫扶藆蹇藅伐莔萌荍翹蚍毗衃浮蕇典蔜五髙􅭚㛮􅘚縷莌奪蘢聾葑方孔蓯緫蒡旁荵忍莤由蓾魯才古柱主夫扶隧遂蘧巨俱􅂼山俱茝昌改蘮計蒘如髦毛蕀棘雚貫􅙛徒南莐沉蕍俞蕮昔蔨巨隕􅓂霍莥女九薃浩媞提莞官蒚力茄加蕸遐蔤密華戸􅀲菡戸感萏徒感薏憶蘬丘軌蒫才何黂扶刃枲皁以菲匪蒠息蕢巨貴蘼美萹偏濼爍衆終莙其隕薻早蓫他六他羊苹平蓱瓶莃希藬吐回蘈頽藚續藾賴蔆凌攗眉薛百賛葥箭莓每藫潭蘜菊蓨他凋茥蒛缺葐盆芨急虃纎菺肩蘻計蕧服茡字藐亡角茈子爾脫奪蘵職蒢除藒挈芞乞葞尾蔠終菋未荎直其藸除蒤徒藈圭椉繩衱劫袶絳攫钁盱吁蔝米蔜五刀湅柬馗逵菌巨隕菆輙苕調蔈標茇沛蘪眉數朔鄰吝閔筡徒笐杭䈚待枹包芏杜其葴針戸藗速菤捲􅣀鱉莣亡藨蒲苗藨平表薂亦購古豆蔞力朱茢列葽烏了蒬冤茦􅁽刺次萩秋銚姚芅亦芣浮苢以綸古苀亡岡蠡禮萿古活搴居展拒巨朐劬芺荂吁蔈方腰猋必遥藨方驕芀調蒹兼薕廉菼他敢薍五患虇丘阮蕍俞芛羊棰葟皇荺于閔茭胡巧釋木第十四槄叨榎賈樗丑於椈菊髠坤梱五門椵叚柂夷柟而占柀彼煔衫櫠廢椵賈杻女九檍億楙茂椋良栵例栭而檴鑊楥􅀽抑卭栩香羽杼甞汝荎直之著儲藲歐荎大結槹皐綦其朹求檕計朻紏榽兮計橀許兮梫寢棆倫椐祛樻起愧櫐壘欇渉檵計楰􅁃欇輙寓魚具梂求檖遂楔戞榹斯要腰樲二洗屑典塡田泄屑還旋棯稔樸卜棪琰㯈速欀苦回槐懷聶輙炕呼郎椅於􅀉梀山厄瘣胡罪遒徂由棫域桵人佳樆离辨片枌墳栘移檿烏􅀧柛伸􅯦側吏棤錯皵舄梢朔櫂濁樅七容榝殺華胡化疐帝鑚子管繚了檄亦釋蟲第十五螜斛蜚費蠦盧蜰肥螾引􅨪演蜩調蚻札蠽節蝒縣蜓挺蚞木蛣起􅁻􅎙羌蝎曷􅔒屈蠰餉蜉浮蝣遊蛂歩結蟥黄蛢瓶蠸權父甫蝚柔武江䗐施蝆亡婢蟷丁郎蠰箱蜱毗蛸消蝍即蛆子余蝝縁蝮孚福蜪陶蛬拱蟼驚蛝閑䗃棧蛗阜螽終蠜煩蜤斯蜙嵩蝑胥蟿契歷蠰壤螼羌引蜸苦顯蚕他典貈鶴蛑謀虰丁蛵馨蜭戸感䘃墨蛅而占蟴斯蟠煩蟫淫䖸娥螒汗蚚祈蛶劣螪商螝􅀛蜆演螘魚綺蠪聾朾直耕尉蚳池蟗秋䵹知鼄誅蝥謀蠭蜂蟦費蝤囚􅢤伊蟰蕭蛸所交踦巨綺蛭猪秩蠖於郭蚇尺螟􅁳蛉零炤照蚅厄蠋蜀蠓莫孔蠛亡結蛈大結蝪湯蟓象雔讎蚢杭翥之庶罅呼暇螸俞􅬑特蟊謀豸丈爾釋魚第十六鱣張連鰋偃鯇華板鮀陀鮂囚鰦兹鰼習鰌秋鰹堅鮦同鮵奪魾皮鱯畫鮡兆鰝浩鰕霞鱀忌鱦承鮥洛鮛叔鮪偉鯦俱救魱胡鮤列鱴滅鱊聿鮬歩鱖厥鯞章酉鰴暉魵墳鮅必鱒才損魴房魾毗鯬黎鯠來蜎狂兖蠉香兖蟣祈鼁去􅖚秋蟾占黽猛蜌陛螷蒲猛能奴來賁奔蚹附蠃羅螔移蝓俞蜬含螖滑蠌澤蟧勞珧遥倪五計贆摽魧杭鼯吾鳺大結餔歩敊豉鶆來鵹離鴷列鸄激鶶唐鷵徒鉏鋤鷂遥鷮驕鳪卜鸐狄雗汗鵫丁􅇁翬暉􅔧儔鶅緇鵗希鷷遵鵌徒鼵突鸛歡鷒團鶝楅鶔柔射食亦工役翪宗鳶􅀇蹼􅁲亢戸郎嗉素鳼文鷚力救別彼列長丁丈鶹留􅝎栗黧力知釋獸第十八麔咎麎辰䴠於兆麚加麀於牛麛迷堅麕君麌魚矩麆助麜栗豜五見獥亦嬎芳萬迒剛䝐偉豶墳幺腰奏湊豱温豵宗橧豴滴􅘻垓􅙊厄豝巴虦棧貓苗貘陌甝含虪式六貀尼滑鼳古役麙巗曳乎各貆丸貒湍貗其禹貔毗􅩸火卜父甫貙樞獌萬麢零麠京麃炮􅕱几旄帽魋頽䝟烏八貐羊主驨胡圭羱元麐鄰麂几貄四彚謂刺次狒費被備蹯煩􅚵鈕猱奴刀蝯􅀽钁父甫泥奴細贙鉉豦據蜼誄椉承闕其越狃鈕鼢憤鼸胡忝鼷奚鼶斯鼬佑鼩劬鼭時鼣吠鼫石鼤問鼨終鼮廷鼰古覓齝丑之齛泄齸益釁許靳撟紀小狊古圓釋畜第十九騊陶駼徒倨鋸騉昆趼五見甗言駥戎馵注骹敲驓繒騱奚翑劬踦欺驤箱駵留騵五官驈聿驠宴晏駺郎馰的縣􅀇駹尨減古湛闋缺廣光馻兖褭奴了驂參騇舎騝䖍騽習駽呼縣驎良忍驒陀鬛獵騥柔鴇保駓皮駰乙巾騢遐駩詮喙許穢騧􅀲􅳌閑差叉犘麻犦雹犤悲犩危犣獵犝童犑古覓觭欺觢誓犉閏旬眥才細牰䄂犚尉犈權牬貝犌加羒憤牂臧羭俞羖古觤􅀑觠權羷險羳煩羜直吕猣宗玂祈獫力驗猲歇狣兆獢虚嬌雓餘僆練駥戎犉閏旬羬五咸􅇾滯􅙊厄獒五刀鶤昆爾雅音釋卷下
