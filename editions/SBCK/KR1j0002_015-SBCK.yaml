body:
  text: 螟食葉􅬑食節賊食根蟊分别蟲啖食禾所在之名耳皆見詩有足謂之蟲無足謂之豸釋魚第十六鯉今赤鯉魚鱣鱣大魚似鱏而短鼻口在頷下體有邪行甲無鱗􅁏黃大者長二三丈今江東呼爲黃魚鰋今鰋額白魚鮎別名鯷江東通呼鮎爲鮧鱧鮦也鯇今鱓魚似鱒而大鯊鮀今吹沙小魚體貟而有􅀧文鮂黒鰦即白儵江東呼爲鮂鰼鰌今泥鰌鰹大鮦小者鮵今青州呼小鱺爲鮵魾大鱯小者鮡鱯似鮎而大白色鰝大鰕鰕大者岀海中長二三丈鬚長數尺今青州呼鰕魚爲鰝音酆鄗鯤魚子凢魚之子緫名鯤鱀是鱁鱀䱜屬也體似鱏尾如䱡魚大腹喙小銳而長齒羅生上下相銜鼻在額上能作聲少肉多膏胎生健啖細魚大者長丈餘江中多有之鱦小魚家語曰其小者鱦魚也今江東亦呼魚子未成者爲鱦音繩鮥鮛鮪鮪鱣屬也大者名王鮪小者名鮛鮪今冝都郡自京門以上江中通出鱏鱣之魚有一魚狀似鱣而小建平人呼鮥子即此魚也音洛鯦當魱海魚也似鯿而大鱗肥美多鯁今江東呼其最大長三尺者爲當魱音胡鮤鱴刀今之鮆魚也亦呼爲魛魚鱊鮬鱖鯞小魚也似鮒子而黑俗呼爲魚婢江東呼爲妾魚魚有力者鰴強大多力魵鰕出穢邪頭國見吕氏字林鮅鱒似鱓子赤眼魴魾江東呼魴魚爲鯿一名魾音毗鯬鯠未詳蜎蠉井中小蛣蟩赤蟲一名孑孑廣雅云蛭蟣今江東呼水中蛭蟲入人肉者爲蟣科斗活東蝦蟆子魁陸本草云魁狀如海蛤貟而厚外有理縱横即今之蚶也蜪蚅未詳鼁蟾諸似蝦蟆居陸地淮南謂之去蚊在水者黽耿黽也似青蛙大腹一名土鴨蜌螷今江東呼蚌長而狹者爲螷蚌含􅄴蚌即蜃也鼈三足能􅀛三足賁山海經曰從山多三足鼈大若山多三足􅀛今吴興郡陽羡縣君山上有池池中出三足鼈又有六眼􅀛蚹蠃螔蝓即蝸牛也蠃小者蜬螺大者如斗出日南漲海中可以爲酒杯螖蠌小者蟧螺屬見埤蒼或曰即彭螖也似蟹而小音滑蜃小者珧珧王珧即小蚌􅀛俯者靈行頭低仰者謝行頭仰前弇諸果甲前長後弇諸獵甲後長左倪不􅀋行頭左􅋻今江東所謂左食者以甲􅁲審右倪不若行頭右􅋻爲右食甲形皆爾貝居陸贆在水者蜬水陸異名也貝中肉如科斗但有頭尾耳大者魧書大傳曰大貝如車渠車渠謂車􅦿即魧屬小者鰿今細貝亦有紫色者出日南􅀇貝貽貝黒色貝也餘貾黃白文以黃爲質白爲文􅀧餘泉白黃文以白爲質黃爲文􅀧今之紫貝以紫爲質黒爲文􅀧蚆博而頯頯者中央廣兩頭銳蜠大而險險者謂汚薄􅜽小而橢即上小貝橢謂狹而長此皆􅀃貝之形容蠑螈蜥蜴蜥蜴蝘蜓蝘蜓守宫也轉相解博異語别四名也镻蝁蝮屬大眼最有毒今淮南人呼蝁子音惡螣螣蛇龍􅀋也能興雲霧而遊其中淮南云蟒蛇蟒王蛇蟒蛇最大者故曰王蛇蝮虺博三寸首大如擘身廣三寸頭大如人擘指此自一種蛇名爲蝮虺鯢大者謂之鰕今鯢魚似鮎四脚前似獮猴後似狗聲如小兒啼大者長八九尺魚枕謂之丁枕在魚頭骨中形似篆書丁字可作印魚腸謂之乙魚尾謂之丙此皆似篆書字因以名焉禮記曰魚去乙然則魚之骨體盡似丙丁之屬因形名之一曰神􅀛􅀛之最神明二曰靈􅀛涪陵郡出大􅀛甲可以􅁲縁中文似瑇瑁俗呼爲靈􅀛即今觜􅏲􅀛一名靈􅏲能鳴三曰攝􅀛小􅀛也腹甲曲折解能自張閉好食蛇江東呼爲陵􅀛四曰
