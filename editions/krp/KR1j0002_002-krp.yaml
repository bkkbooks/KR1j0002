body:
  text: 釋言第二殷齊中也書曰以殷仲春釋地曰岠齊州以南斯誃離也齊陳曰斯誃見詩謖興起也禮記曰尸謖還復返也宣徇徧也皆周徧也馹遽傳也皆轉車驛馬之名蒙荒奄也奄奄覆也皆見詩告謁請也皆求請也肅噰聲也詩曰肅噰和鳴格懷來也書曰格尓衆庶懷見詩畛厎致也皆見詩傳恀怙恃也今江東呼母爲恀音是律遹述也皆敘述也方俗語耳俞畣然也禮記曰男唯女俞畣者應也亦爲然豫臚敘也皆陳敘也庶幾尚也詩曰不尚息焉觀指示也國語曰且觀之兵若惠順也詩曰惠然肯來敖幠傲也禮記曰無幠無傲傲慢也幼鞠稚也書曰不念鞠子哀逸諐過也書曰汝則有逸罰疑休戾也戾止也疑者亦止疾齊壯也壯壯事謂速也齊亦疾悈褊急也皆急狹貿賈市也詩曰抱布貿絲厞陋隱也禮記曰厞用席書曰揚側陋遏遾逮也東齊曰遏北燕曰遾皆相及逮征邁行也詩曰行也詩曰齊子愷悌髦士官也取俊士令居官畯農夫也今之嗇夫是也蓋割裂也蓋未詳邕支載也皆方俗語亦未詳諈諉累也以事相屬累爲諈諉漠察清也皆清明庇庥廕也今俗語呼樹䕃爲庥榖履禄也書曰旣富方榖詩曰福履將之履禮也禮可以履行見易隱占也隱度逆迎也㦧曽也發語辭見詩増益也今江東通言増窶貧也謂貧陋薆隱也謂隱蔽僾唈也嗚唈短氣皆見詩基經也基業所以自經營基設也亦爲造設祺祥也謂徴祥祺吉也祥吉之先見兆域也謂塋界肈敏也書曰肈牽車牛挾藏也今江東通言挾浹徹也謂霑徹替廢也替滅也亦爲滅絶速徴也徴召也易曰不速之客琛寶也詩曰來獻其琛探試也刺探甞試髦選也俊士之選髦俊也士中之俊如毛中之髦俾職也使供職紕飾也謂縁飾見詩淩慄也淩懅戰慄慄慼也戰慄者憂慼蠲明也蠲清明貌茅明也左傳曰前茅慮無明朗也猷圖也周官曰以猷鬼神祇謂圖畫猷若也詩曰寔命不猷偁舉也書曰爾爾戈稱好也物稱人意亦爲好坎律銓也易坎卦主法法律皆所以銓量輕重矢誓也相約誓舫舟也並兩船泳游也潜行游水底迨及也東齊曰迨冥幼也幼稚者冥昧降下也傭均也齊等強暴也強梁淩暴宨肆也輕宨者好放肆肆力也肆極力俅戴也詩曰戴弁俅俅瘞幽也幽亦蕹也氂罽也毛氂所以爲罽烘燎也謂燒燎煁烓也今之三隅竈見詩陪朝也陪位爲朝康苛也謂苛刻樊藩也謂藩籬賦量也賦稅所以評量粻糧也今江東通言粻庶侈也庶者衆多爲奢侈庶幸也庶㡬僥倖筑拾也謂拾掇奘駔也今江東呼大爲駔駔猶麤也集㑹也舫泭也水中竺二稗筏洵均也謂調均洵龕也未詳逮遝也今荆楚人皆云遝音沓是則也是事可法則畫形也畫者爲形象賑富也謂隱賑富有局分也謂分部懠怒也詩曰天之方懠音薺僁聲也謂聲音葵揆也詩曰天子葵之揆度也商度逮及也惄飢也惄然飢意眕重也謂厚重見左傳獵虐也淩獵暴虐土田也别二名戍遏也戍守所以止寇賊師人也謂人衆硈鞏也硈然堅固棄忘也嚻閑也嚻然閑暇貌謀心也謀慮以心獻聖也謚法曰聦明睿智曰獻里邑也謂邑居襄除也詩曰不可襄振古也詩曰振古如兹猶云乆若此懟怨也縭介也縭者繫介猶閡號謼也今江東皆言謼凶咎也苞稹也今人呼物叢緻者爲稹逜寤也相干寤顁題也題額也詩曰麟之定猷肯可也詩曰猷來無棄肯今通言務侮也詩曰外禦其侮貽遺也相歸遺貿買也廣二名賄財也甲狎也謂習狎菼騅也菼薍也詩曰毳衣如菼菼草色如騅在青白之閒粲餐也今河北人呼食爲餐渝變也謂變易冝肴也詩曰與子冝之夷恱也詩曰我心則夷顚頂也頭上耋老也八十爲耋輶輕也詩曰德輶如毛俴淺也詩曰小戎俴收綯絞也糾絞繩索訛化也詩曰四國是訛跋躐也詩曰狼跋其胡疐跲也詩曰載疐其尾烝塵也人衆所以生塵埃戎相也相佐助飫私也宴飲之私孺屬也謂親屬幕暮也幕然暮夜煽熾也熾盛也互相訓煽義見詩柢本也謂根本窕閒也窈窕閒隙淪率也相率使罹毒也憂思慘毒檢同也模範同等郵過也道路所經過遜遯也謂逃去斃踣也前覆僨僵也却偃畛殄也謂殄絶曷盍也盍何不虹潰也謂潰敗隌闇也隌然冥貌䵑膠也膠黏䵑孔甚也厥其也戛禮也謂常禮闍臺也城門臺囚拘也謂拘執攸所也展適也得自申展皆適意鬱氣也鬱然氣出宅居也休慶也祈叫也祈祭者叫呼而請事濬幽深也濬亦深也哲智也弄玩也尹正也謂官正也皇匡正也詩曰四國是皇服整也服御之令齊整聘問也見穀梁傳愧慙也殛誅也書曰鯀則殛死克能也翌明也書曰翌日乃瘳訩訟也言訩譊晦冥也奔走也逡退也外傳曰巳復於事而逡疐仆也頓躓倒仆亞次也諗念也相思念届極也有所限極奄同也詩曰奄有龜蒙弇蓋也謂覆蓋恫痛也詩曰神罔時恫握具也謂備具振訊也振者奮迅䦧恨也相怨恨越揚也謂發揚對遂也詩曰對揚王休燬火也詩曰王室如燬燬齊人語懈怠也宣緩也謂寛緩遇偶也偶相值遇曩曏也國語曰曩而言戲也偟暇也詩曰不遑啓處宵夜也懊忨也謂愛忨愒貪也謂貪羡榰柱也相榰柱裁節也並併也詩曰並坐鼓瑟卒旣也旣巳慒慮也謂謀慮也將資也謂資裝薾紩也今人呼縫紩衣爲薾遞迭也更迭矧況也譬況廩廯也或說云即倉廩所未詳逭逃也亦見禮記訊言也相問訊閒俔也左傳謂之諜今之細作也沄沆也水流漭沆干扞也相扞衞趾足也足脚䠊刖也斷足襄駕也書曰懷山襄陵忝辱也燠煖也今江東通言燠塊堛也土塊也外傳曰枕由以堛將齊也謂分齊也詩曰或肆或將餬饘也麋也啓跪也爾雅釋音卷中釋宫第五扆倚宧夷㝔要柣于結閾域楔古黠樞昌朱椳於回􅩖士坫店杇烏椹砧榩䖍􅉳於糾堊於故樴徒得杙亦楎暉臬魚列闍都榤竭垣袁塒時杗云廇力又梲拙䦕卞槉疾楶節桴浮榱衰檐簷樀滴簃丈知筄曜郷向屏卑井宁佇閍補耕觀貫衖巷塾熟橛其月闑魚列瓴靈甋的甓蒲覓壼苦本劇極隄低杠江徛寄陜狹釋器第六籩邊盎烏浪缶方九瓿蒲口瓵移瓠胡甈契斪衢斸丁録定多倿鐯張略鍬疀揷緵子弄罭域嫠離笱狗罺嘲汕所諫篧士角槮桑感罝嗟罞茆彘滯羉鸞罛孤繴壁罿衝罬拙罦浮絇其俱分粉卣由裗流䘽倪襮博縁餘絹純之閏袕穴褮營眥才細衱劫袸賤褑院衽稔袺結扱揷襜昌占褘暉縭离緌汝誰纀卜捐囚絹鑣表驕钀魚列轙儀呼盖餯許穢饐意餲隘糷輦糪柏餒奴罪斮荘略鮨祁醢海臡泥垽魚靳鼐耐圜袁鼒咨釴亦款苦管鬲力􅑄㝷鉹侈璲遂區羗于翮戸革縳篆緷衮虡巨藣卑蔌速蓋合璗蕩鏐留鐐遼鉼餅鈑板鈏引鵠斛觷嶽剒錯剫鐸璆求銑蘇典鏃作木縁椽弭尾蜃腎珧姚琡俶好耗瑗院縓缺􅒋赬敕呈纁勲􅉳於糾邸氐蓐辱箷移側士辨片韏眷䤹蘇婁卣酉釋樂第七徴知矢灑所蟹鼖墳應膺毊虚嬌篪池沂銀塤喧嘂叫剽瓢棧盞筊爻簥嬌篞乃結篎妙籥藥箹渥吹昌睡和胡卧咢五各寋紀展柷昌孰敔語籈眞鼗桃料聊釋天第八長丁丈嬴盈荐賤閼烏割著直略重直龍黓亦牂臧洽峽涒湯昆噩五各閹掩敦頓窒知乙塞先北陬側留寎孚柄且子余相息亮涂徒凱口改頽徒回猋必遥庉徒飄瓢雨芋曀於計應譍雺蒙螮帝蝀丁孔雩于句挈苦結弇霆廷霓倪䨘酥練涷東霡麥霂木霖林濟柤細霽徂計亢剛氏低析惜枵許嬌顓專頊旭虚墟定多佞娵子瑜觜咨降胡江咮渚究何胡可启啓欃初銜槍初庚彴蒲握礿藥燔煩庪居委縣玄磔責禷類禡罵禘大計肜容胙昨蒐搜獮息淺狩手又獠遼闐田綢叨杠江纁勲縿杉廣土曠長直亮旐兆斾佩毛旟餘釋地第九雝於用濟子礼陓於于藪叟阠信隃戍溴古壁珣荀玗于㑹古外稽古兮崘路昆虚虚􅚌尺鰈牒鶼兼邛巨凶岠巨齧五結難乃旦蟨厥迭徒結枳居是坰古螢溼濕陂披阪反菑緇畬餘邠彬濮卜觚孤釋丘第十敦都昆銳惠椉繩正陼渚潦老而還旋渻所景沮辭與覆敦堆邐吕紙迆余紙定丁佞厓牙洒先典漘脣隩奥隈烏回重直龍滸虎涘士汜似溦眉釋山第十一坯備悲崧嵩嶠喬巋丘鬼岌魚泣峘桓屬燭亦崒子恤厜姊規㕒危盛成嶞湯果重直龍甗言隒儼口别彼列鮮息淺陘形磝苦交礐殻岵戸起澩學豄讀崔徂回嵬五回砠七余澞虞釋水第十二見現否卑羙瀐纎瀱計汋仕捉縣玄氿軌仄側湀揆過古禾辨片灉於用潬但汧牽瀵糞軌濋楚汶問灛闡沱陀濄烏禾潁餘頃濆墳灡爛漪衣湄眉濟子細揭上二字音憩下丘竭繇由上時掌紼弗縭离􅛢律緌如誰造七到泭桴澮古外泝素陼渚坻池潏述虚墟駭諧楷頰劫覆扶服鬴父鬲革爾雅卷中
