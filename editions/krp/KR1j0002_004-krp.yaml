body:
  text: 宗族母之考爲外王父母之妣爲外王母母之王考爲外曽王父母之王妣爲外曾王母異姓故言外母之晜弟爲舅母之從父晜弟爲從舅母之姊妹爲從母從母之男子爲從母晜弟其女子子爲從母姊妹母黨妻之父爲外舅妻之母爲外姑謂我舅者吾謂之甥然則亦冝呼壻爲甥孟子曰帝館甥于二室是姑之子爲甥舅之子爲甥妻之晜弟爲甥姊妹之夫爲甥四人體敵故更相爲甥甥猶生也今人相呼蓋依此妻之姊妹同出爲姨同出謂俱巳嫁詩曰邢侯之姨女子謂姊妹之夫爲私詩曰譚公維私男子謂姊妹之子爲出公羊傳曰蓋舅出女子謂晜弟之子爲姪左傳曰姪其從姑謂出之子爲離孫謂姪之子爲歸孫女子子之子爲外孫女子同出謂先生爲姒後生爲娣同出謂俱嫁事一夫公羊傳曰諸侯娶一國二國往媵之以姪娣從娣者何弟也此即其義也女子謂兄之妻爲嫂弟之妻爲婦猶今言新婦是也長婦謂稚婦爲娣婦娣婦謂長婦爲姒婦今相呼先後或云妯娌妻黨婦稱夫之父曰舅稱夫之母曰姑姑舅在則曰君舅君姑没則曰先舅先姑國語曰吾聞之先姑謂夫之庶母爲少姑夫之兄爲兄公今俗呼兄鐘語之轉耳夫之弟爲叔夫之姊爲女公夫之女弟爲女妹今謂之女妹是也子之妻爲婦長婦爲嫡婦衆婦爲庶婦女子子之夫爲壻壻之父爲姻婦之父爲婚父之黨爲宗族母與妻之黨爲兄弟婦之父母壻之父母相謂爲婚姻兩壻相謂爲亞詩曰瑣瑣姻亞今江東人呼同門爲僚壻婦之黨爲婚兄弟壻之黨爲姻兄弟古者皆謂婚姻爲兄弟嬪婦也書曰嬪于虞謂我舅者吾謂之甥也婚姻爾雅卷上經四千一百三十二字注五千四百一十六字爾雅卷中郭璞注釋宫第五釋器第六釋樂第七釋天第八釋地第九釋丘第十釋山第十一釋水第十二釋宫第五宫謂之室室謂之宫皆所以通古今之異語明同實而兩名牖戸之閒謂之扆䆫東戸西也禮云斧扆者以其所在處名之其内謂之家今人稱家義出於此東西墻謂之序所以序別内外西南隅謂之奥室中隱奥之處西北隅謂之屋漏詩曰尚不媿於屋漏其義未詳東北隅謂之宧宧見禮亦未詳東南隅謂之㝔禮曰婦室聚㝔㝔亦隱閣柣謂之閾閾門限棖謂之楔門兩旁木楣謂之梁門戸上横梁樞謂之椳門户扉樞樞逹北方謂之落時門持樞者或逹北檼以爲固也落時謂之􅩖道二名也垝謂之坫在堂隅坫㙐也牆謂之墉書曰旣勤垣墉鏝謂之杇泥鏝椹謂之榩斫木櫍也地謂之黝黑飾地也牆謂之堊白飾牆也樴謂之杙橜也在牆者謂之楎禮記曰不敢縣於夫之楎箷在地者謂之臬即門橜也大者謂之栱長者謂之閣别杙所在長短之名闍謂之臺積土四方有木者謂之榭臺上起屋雞棲於弋爲榤鑿垣而棲爲塒今寒郷穿牆棲雞皆見詩植謂之傳傳謂之突戸持鏁植也見埤蒼杗廇謂之梁屋大梁也其上楹謂之梲侏儒柱也關謂之槉柱上欂也亦名枅又曰㭼栭謂之楶即櫨也棟謂之桴屋檼桷謂之榱屋椽桷直而遂謂之閱謂五架屋際椽正相當直不受檐謂之交謂五架屋際椽不直上檐交於檼上檐謂之樀屋相容謂之防形如今牀頭小曲屏風唱射者所以自防隱見周禮連謂之移堂樓閣邊小屋今呼之簃厨連觀也屋上薄謂之筄屋笮兩階間謂之郷人君南郷當階間中庭之左右謂之位羣臣之列位也門屏之間謂之宁人君視朝所宁立處屏謂之樹小牆當門中閍謂之門詩曰祝祭於枋正門謂之應門朝門觀謂之闕宫門雙闕宫中之門謂之闈謂相通小門也其小者謂之閨小閨謂之閤大小異名衖門謂之閎左傳曰盟諸僖閎閎衖頭門門側之堂謂之塾夾門堂也橛謂之闑門閫闔謂之扉公羊傳曰齒著于門闔所以止扉謂之閎門辟旁長橛也左傳曰髙其閈閎閎長杙即門橜也瓴甋謂之甓㼾甎也今江東呼瓴甓宫中衖謂之壼巷閤間道廟中路謂之唐詩曰中唐有甓堂途謂之陳堂下至門徑也路旅途也途即道也路場猷行道也博說道之異名一逹謂之
