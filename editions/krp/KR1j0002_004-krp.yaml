front:
  text: 幻惑欺誑人者誰昔昔也誰發語辭不辰不時也辰亦時也凡曲者爲罶毛詩傳曰罶曲梁也凡以簿爲魚笱者名爲罶鬼之爲言歸也尸子曰古者謂死人爲歸人釋親第四父爲考母爲妣禮記曰生曰父母妻死曰考妣嬪今丗學者從之按尚書曰大傷厥考心事厥考厥長聦聽祖考之彞訓如䘮考妣公羊傳曰惠公者何隱之考也仲子者何桓之母也蒼頡篇曰考妣延年書曰嬪于虞詩曰韋嬪于京周禮有九嬪之官明此非死生之異稱矣其義猶今謂兄爲晜妹爲媦即是此例也父之考爲王父父之妣爲王母加王者尊之王父之考爲曽祖王父王父之妣爲曽祖王母曾猶重也曽祖王父之考爲髙祖王父曽祖王父之妣爲髙祖王母髙者言最在上父之丗父叔父爲從祖祖父父之丗母叔母爲從祖祖母從祖而别丗統異故父之晜弟先生爲丗父後生爲叔父丗有爲嫡者嗣丗統故也男子先生爲兄後生爲弟男子謂女子先生爲姊後生爲妹父之姊妹爲姑父之從父晜弟爲從祖父父之從祖晜弟爲族父族父之子相謂爲族晜弟族晜弟之子相謂爲親同姓同姓之親無服屬兄之子弟之子相謂爲從父晜弟從父而别子之子爲孫孫猶後也孫之子爲曽孫曽猶重也曽孫之子爲玄孫玄者言親屬微昧也玄孫之子爲來孫言有往來之親來孫之子爲晜孫晜後也汲冢竹書曰不窟之晜孫晜孫之子爲仍孫仍亦重也仍孫之子爲雲孫言輕逺如浮雲王父之姊妹爲王姑曽祖王父之姊妹爲曽祖王姑髙祖王父之姊妹爲髙祖王姑父之從父姊妹爲從祖姑父之從祖姊妹為族祖姑父之從父晜弟之母爲從祖王母父之從祖晜弟之母爲族祖王母父之兄妻爲丗母父之弟妻爲叔母父之從父晜弟之妻爲從祖母父之從祖晜弟之妻爲族祖母父之從祖祖父爲族曽王父父之從祖祖母爲族曽王母父之妾爲庶母祖王父也晜兄也今江東人通言晜
