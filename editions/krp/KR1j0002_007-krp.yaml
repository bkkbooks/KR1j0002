front:
  text: 博其中謂之剽小者謂之棧大簫謂之言編二十三管長尺四寸小者謂之筊十六管長尺二寸簫一名籟大管謂之簥管長尺圍寸洴漆之有底賈氏以爲如箎六孔其中謂之篞小者謂之篎大籥謂之産籥如笛三孔而短小廣雅云七孔其中謂之仲小者謂之箹徒鼔瑟謂之步獨作之徒吹謂之和徒歌謂之謡詩云我歌且謡徒擊鼔謂之咢詩云或歌或咢徒鼔鐘謂之修徒鼔磬謂之寋未見義所出所以鼔柷謂之止柷如漆桶方二尺四寸深一尺八寸中有椎柄連底桐之令左右擊止者其椎名所以鼔敔謂之籈敔如伏虎背上有二十七鉏鋙刻以木長尺櫟之籈者其名大鼗謂之麻小者謂之料麻者音穊而長也料者聲清而不亂和樂謂之節釋天第八穹蒼蒼天也天形穹隆其色蒼蒼因名云春爲蒼天萬物蒼蒼然生夏爲昊天言氣皓旴秋爲旻天旻猶愍也愍萬物彫落冬爲上天言時無事在上臨下而已
  hash: sha256:3843fca5546d00af97eb8f771cf9cbe5b06fd55adb8fa780057608cf9ffd5f95
