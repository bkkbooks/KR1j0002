body:
  text: 四時春爲青陽氣青而温陽夏爲朱明氣赤而光明秋爲白藏氣白而收藏冬爲玄英氣黒而清英四氣和謂之玉燭道光照春爲發生夏爲長嬴秋爲收成冬爲安寧此亦四時之别號尸子皆以爲太平祥風四時和爲通正道平暢也謂之景風所以致景風甘雨時降萬物以嘉莫不善之謂之醴泉所以出醴泉祥榖不熟爲饑五穀不成𬞞不熟爲饉凡草菜可食者通名爲𬞞果不熟爲荒果木子仍饑爲荐連歳不熟左傳曰今又荐饑災太歳在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰強圉在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰玄􅘬在癸曰昭陽歳陽太歳在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰恊洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若載歳也夏曰歳取歳星行一次商曰祀取四時一終周曰年取禾一熟唐虞曰載取物終更始歳名月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極月陽正月爲陬離騷云攝提貞於孟陬二月爲如三月爲寎四月爲余五月爲臯六月爲且七月爲相八月爲壯九月爲玄國語云至於玄月是也十月爲陽純隂用事嫌於無陽故以名云十一月爲辜十二月爲涂皆月之别名自歳陽至此其事義皆所未詳通者故闕而不論月名南風謂之凱風詩曰凱風自南東風謂之谷風詩云習習谷風北風謂之涼風詩云北風其涼西風謂之㤗風詩云泰風有隧焚輪謂之穨暴風從上下扶揺謂之猋暴風從下上風與火爲庉庉庉熾盛之貌迴風爲飄旋風也日出而風爲暴詩云終風且暴風而雨土爲霾詩曰終風且霾隂而風爲曀詩曰終風且曀天氣下地不應曰雺言蒙昧地氣發天不應曰霧霧謂之晦言晦冥螮蝀謂之雩螮蝀虹也俗名爲美人虹江東呼雩音芌蜺爲挈貳蜺雌虹也見離騷挈貳其别名見尸子弇日爲蔽雲即暈氣五彩覆日也疾雷爲霆霓雷之急激者謂霹靂雨䨘爲霄雪詩曰如彼雨雪先集維䨘䨘水雪雜下者故謂之消雪暴雨謂之涷今江東呼夏月暴雨爲涷雨離騷云今飄風兮先驅使涷雨兮灑塵是也涷音東西之東小雨謂之霡霂詩曰益之以霡霂久雨謂之淫左傳曰天作淫雨淫謂之霖雨自三日已上爲霖濟謂之霽今南陽人呼雨止爲霽音薺風雨壽星角亢也數起角亢列宿之長故曰壽天根氐也角亢下繫於氐若木之有根天駟房也龍馬天馬故房四星謂之天駟大辰房心尾也龍星明者以爲時候故曰大辰大火謂之大辰大火心也在中最明故時候主焉析木謂之津即漢津也箕斗之閒漢津也箕龍尾斗南斗天漢之津梁星紀斗牽牛也牽牛斗者日月五星之所終始故謂之星紀玄枵虚也虚在正北北方色黒枵之言耗耗亦虚意顓頊之虚虚也顓頊水德位在北方北陸虚也虚星之名凡四營室謂之定定正也作宫室皆以營室中爲正娵觜之口營室東壁也營室東壁星四方似口因名云降婁奎婁也奎爲溝瀆故名降大梁昴也西陸昴也昴西方之宿別名旄頭濁謂之畢掩兎之畢或呼爲濁因星形以名咮謂之柳咮朱鳥之口柳鶉火也鶉鳥名火屬南方北極謂之北辰北極天之中以正四時何鼔謂之牽牛今荆楚人呼牽牛星爲檐鼔檐者荷也明星謂之启明太白星也晨見東方爲启明昏見西方爲太白彗星爲欃槍亦謂之孛言其形孛孛似埽彗奔星爲彴約流星星名春祭曰祠祠之言食夏祭曰礿新菜可汋秋祭曰甞甞新榖冬祭曰蒸進品物也祭天曰燔柴旣祭積薪燒之祭地曰瘞薶旣祭埋藏之祭山曰庪縣或庪或縣置之於山山海經曰縣以吉玉是也祭川曰浮沈投祭水中或浮或沈祭星曰布布散祭於地祭風曰磔今俗當大道中磔狗云以止風此其象是禷是禡師祭也師出征伐類於上帝禡於所征之地旣伯旣禱馬祭也伯祭馬祖也將用馬力必先祭其先禘大祭也五年一大祭繹又祭也祭之明日尋繹復祭周曰繹春秋經曰壬午猶繹商曰肜書曰髙宗肜日夏曰復胙未見義所出祭名春獵爲蒐搜索取不任者夏獵爲苗爲苗稼除害秋獵爲獮順殺氣也冬獵爲狩得獸取之無所擇宵田爲獠管子曰獠獵畢弋今江東亦呼獵爲獠音遼或曰即今夜獵載鑪照也火田爲狩放火燒草獵亦爲狩乃立冢土戎醜攸行冢土大社戎醜大衆起大事動大衆必先
