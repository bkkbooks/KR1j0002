front:
  text: 有穴為岫謂巖穴山西曰夕陽暮乃見日山東曰朝陽旦即見日泰山爲東嶽華山爲西嶽霍山爲南嶽即天柱山潜水所出恒山爲北嶽常山嵩髙爲中嶽大室山也梁山晉望也晉國所望祭者今在馮翊夏陽縣西北臨河上釋水第十二泉一見一否爲瀐瀐纔有貌井一有水一無水爲瀱汋山海經曰天井夏有水冬無水即此類也濫泉正出正出涌出也公羊傳曰直出直猶正也沃泉縣出縣出下出也從上溜下沈泉穴出穴出庂出也從旁出也湀闢流川通流過辨回川旋流灉反入即河水決岀復還入者河之有灉猶江之有沱潬沙出今江東呼水中沙堆爲潬音但汧出不流水泉潜出便自停成汙池歸異出同流肥毛詩傳曰所出同所歸異爲肥瀵大出尾下今河東汾隂縣有水口如車輪許濱沸漏出其深無限名之爲瀵馮翊郃陽縣復有瀵亦如之相去數里而夾河河中陼上又有一瀵瀵源皆潛相通在汾隂者人壅其流以爲陂種稻呼其本所出處爲瀵魁此是也尾猶底也水醮曰厬謂水醮盡水自河出爲灉書曰灉沮會同濟爲濋汶爲瀾洛爲波漢爲濳書曰沱潜旣道淮爲滸江爲沱書曰岷山導江東别爲沱濄爲洵潁爲沙汝爲濆詩曰遵彼汝濆皆大水溢出别爲小水之名水決之澤爲汧水決入澤中者亦名爲汧決復入爲汜水出去復還河水清且灡漪大波爲瀾言渙瀾小波爲淪言藴淪直波爲徑有徑涏江有沱河有灉汝有濆此故上水别出耳所作者重見滸水厓水邊地水草交爲湄詩曰居河之湄濟有深渉渭濟渡之處深則厲淺則揭揭者揭衣也謂褰裳也以衣渉水爲厲衣謂禈繇膝以下爲揭繇膝以上爲渉繇帶以上爲厲繇自也濳行爲泳水底行也晏子春秋曰濳行逆流百歩順流七里汎汎楊舟紼縭維之紼􅛢也􅛢索縭緌也緌繫天子造舟比舩爲橋諸侯維舟維連四舩大夫方舟併兩舩士特舟單舩庶人乗泭併木以渡水注川曰谿注谿曰谷注谷曰溝注溝曰澮注澮曰瀆此皆道水轉相灌注所入之處名逆流而上曰泝洄順流而下曰泝游皆見詩正絕流曰亂直横渡也書曰亂于河江河淮濟爲四瀆四瀆者發原注海者也
