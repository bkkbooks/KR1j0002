body:
  text: 水泉水中可居者曰洲小洲曰陼小陼曰沚小沚曰坻人所爲爲潏人力所作水中河出崐崘虚色白山海經曰河出崐崘西北隅虚山下基也所渠并千七百一川色黃潜流地中汩漱沙壤所受渠多衆水溷淆冝其濁黄百里一小曲千里一曲一直公羊傳曰河曲流河千里一曲一直河曲徒駭今在成平縣義所未聞太史今所在未詳馬頰河勢上廣下狹狀如馬頰覆鬴水中可居往往而有狀如覆釡胡蘇東莞縣今有胡蘇亭其義未詳簡水道簡易絜水多約絜鉤盤水曲如鉤流盤桓也鬲津水多阨狹可隔以爲津而横渡九河從釋地已下至九河皆禹所名也爾雅卷中經三千五百六十四字注四千三百二十二字
