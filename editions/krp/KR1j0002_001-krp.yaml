  text: 爾雅卷上
  hash: sha256:58d8e192b77644fb6930be9759e5f66d7525930d9cd63e2efe7bdc6209542b22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0002_SBCK_001-1a}
body:
  text: 郭璞注釋詁第一釋言第二釋訓第三釋親第四釋詁第一初哉首基肇祖元胎俶落權輿始也尚書曰三月哉生魄詩曰令終有俶又田俶載南畝又曰訪子落止又曰胡不承權輿胚胎未成亦物之始也其餘皆義之常行者耳此所以釋古今之異言通方俗之殊語林烝天帝皇王后辟公侯君也詩曰有壬有林又曰文王烝哉其餘義皆通見詩書弘廓宏溥介純夏幠厖墳嘏丕弈洪誕戎駿假京碩濯訏宇穹壬路淫甫景廢壯冢簡箌昄晊將業席大也詩曰我受命溥將又曰亂如此幠爲下國駿厖湯孫奏假王公伊濯訏謨定命有壬有林厥聲載路旣有淫威廢爲殘賊爾土宇昄章緇衣之席兮廓落宇宙穹隆至極亦爲大也箌義未聞尸子曰此皆大有十餘名而同一實幠厖有也二者又爲有也詩曰遂幠大東迄臻極到赴來弔艐格戾懷摧詹至也齊楚之㑹郊曰懷宋曰届詩曰先祖于摧又曰六日不詹詹摧皆楚語方言云如適之嫁徂逝往也方言云自家而出謂之嫁猶女出爲嫁賚貢錫卑子貺賜也皆賜與也儀若祥淑鮮省臧嘉令類綝彀攻榖介徽善也詩曰儀刑文王左傳曰禁禦不若詩曰永錫爾類我車旣攻介人維藩大姒嗣徽音省綝彀未詳其義餘皆常語舒業順敘也皆謂次敘舒業順敘緒也四者又爲端緒怡懌恱欣衎喜愉豫愷康妉般樂也皆見詩恱懌愉釋賔協服也皆謂喜而服從遹遵率循由從自也自猶從也遹遵率循也三者又爲循行靖惟漠圖詢度咨諏究如慮謨猷肈基訪謀也國語曰詢于八虞咨于二虢度于闕夭謀于南宮諏于蔡原訪于辛尹通謂謀議耳如肈所未詳餘皆見詩典彞法則刑範矩庸恒律戛職秩常也庸戛職秩義見詩書餘皆謂常法耳柯憲刑範辟律矩則法也詩曰伐柯伐柯其則不逺論語曰不踰矩辜辟戾辠也皆刑罪黃髮齯齒鮐背耇老壽也黃髮髮落更生黃者齯齒齒墮更生細者鮐背背皮如鮐魚耇猶耆也皆壽考之通稱允孚亶展諶誠亮詢信也方言曰荆吴淮汭之間曰展燕岱東齊曰諶宋衞曰詢亦皆見詩展諶允愼亶誠也轉相訓也詩曰愼爾優遊謔浪笑敖戲謔也謂諷戲也見詩粤于爰曰也書曰土爰稼穡詩曰對越在天王于出征爰粤于也轉相訓爰粤于那都繇於也左傳曰棄甲則那那猶今人云那那也書曰臯陶曰都繇辭於乎皆語之韻絶㪉郃盍翕仇偶妃匹㑹合也皆謂對合也仇讎敵妃知儀匹也詩云君子好仇樂于之無知實維我儀國語亦云丹朱憑身以儀之讎猶儔也廣雅云讎輩也妃合㑹對也皆相當對妃媲也相偶媲也紹㣧嗣續纂緌績武係繼也詩曰下武維同緌見釋水餘皆常語忥謚溢蟄愼貉謐顗頠密寧靜也忥顗頠未聞其義餘皆見詩傳隕磒湮下降墜摽蘦落也磒猶隕也方俗語有輕重耳湮沈落也摽蘦見詩命令禧畛祈請謁訊誥告也禧未聞禮記曰畛於鬼神永悠迥違遐逷闊逺也書曰逷矣西土之人永悠迥逺遐也遐亦逺也轉相訓虧壞圯垝毀也書曰方命圯族詩曰乗彼垝垣虧通語耳矢雉引延順薦劉繹尸旅陳也禮記曰尸陳也雉順劉皆未詳尸職主也左傳曰殺老牛莫之敢尸詩曰誰其尸之又曰職爲亂階尸寀也謂寀地寀寮官也官地爲寀同官爲寮績緒采業服冝貫公事也論語曰仍舊貫餘皆見詩書永羕引延融駿長也宋衞荆吴之間曰融羕所未詳喬嵩崇髙也皆髙大貌左傳曰師叔楚之崇也崇充也亦爲充盛犯奢果毅剋捷功肩堪勝也陵犯誇奢果毅皆得勝也左傳曰殺敵爲果肩即剋耳書曰西伯堪黎勝肩戡劉殺克也轉相訓耳公羊傳曰克之者何殺之也劉獮斬刺殺也書曰咸劉厥敵秋獵爲獮應殺氣也公羊傳曰刺之者何殺之也亹亹蠠没孟敦朂釗茂劭勔勉也詩曰亹亹文王蠠没猶黽勉書曰茂哉茂哉方言云周鄭之間相勸勉爲勔釗孟未聞騖務昏暋強也馳騖事務皆自勉強書曰不昏作勞暋不畏死卬吾台予朕身甫余言我也卬猶姎也語之轉耳書曰非台小子古者貴賤皆自稱朕禮記云授政任功曰予一人畛於鬼神曰有某甫言見詩朕余躬身也今人亦自呼爲身台朕賚卑卜陽予也賚卜卑皆賜與也與猶予也因通其名耳魯詩云陽如之何今巴濮之人自呼阿陽肅延誘薦餤晉寅藎進也禮記曰主人肅客詩曰亂是用餤王之藎臣易曰晉進也寅未詳羞餞迪烝進也皆見詩禮詔亮左右相導也皆謂敎導之詔相導左右助勴也勴謂賛勉亮介尚右也紹介勸尚皆相佑助左右亮也反覆相訓以盡其義緝熈烈顯昭皓熲光也詩曰學有緝熈于光明又曰休有烈光劼鞏堅篤掔􅐚膠固也劼􅐚皆見詩書易曰鞏用黄牛之革固志也掔然亦牢固之意疇孰誰也易曰疇離祉暀暀皇皇藐藐穆穆休嘉珍褘懿鑠美也自穆穆已上皆美盛之貌其餘常語諧輯協和也書曰八音克諧左傳曰百姓輯睦關關噰噰音聲和也皆鳥鳴相和勰燮和也書曰燮友柔克從申神加弼崇重也隨從弼輔增崇皆所以爲重疊神所未詳觳悉卒泯忽滅罄空畢罊殱抜殄盡也觳今直語耳忽然盡貌今江東呼厭極爲罊餘皆見詩苞蕪茂豐也苞叢繁蕪皆豐盛揫斂屈收戢蒐裒鳩樓聚也禮記曰秋之言揫揫斂也春獵爲蒐蒐者以其聚人衆也詩曰屈此羣醜原隰裒矣左傳曰以鳩其民樓猶今言拘樓聚也肅齊遄速亟屢數迅疾也詩曰仲山甫徂齊寁駿肅亟遄速也詩曰不寁故也駿猶迅速亦疾也壑阬阬滕徴隍漮虚也壑谿壑也阬阬謂阬壍也隍城池無水者方言云漮之言空也皆謂丘墟耳滕徵未詳黎庶烝多醜師旅衆也皆見詩洋觀裒衆那多也詩曰薄言觀者又曰受福不那洋溢亦多貌流差柬擇也皆選擇見詩戰慄震驚戁竦恐慴懼也詩曰不戁不竦慴即懾也痡瘏虺頽玄黄劬勞咎顇瘽瘉鰥戮癙癵㾖痒疧疵閔逐疚痗瘥痱􅓠瘵瘼癠病也虺頽玄黃皆人病之通名而說者便爲之馬病失其義也詩曰生我劬勞書曰智藏瘝在相戮辱亦可恥病也今江東呼病曰瘵東齊曰瘼禮記曰親癠色容不盛戮逐未詳餘皆見詩恙寫悝盱繇慘恤罹憂也今人云無恙謂無憂也寫有憂者思散寫也詩曰悠悠我悝云何盱矣繇役亦爲憂愁也倫勩邛敕勤愉庸癉勞也詩曰莫知我勩維王之邛哀我癉人國語曰無功庸者倫理事務以相約敕亦爲勞勞苦者多情愉今字或作窳同勞來強事謂翦篲勤也詩曰職勞不來自勉強者亦勤力者由事事故爲勤也詩曰迨其謂之翦篲未詳悠傷憂思也皆感思也懷惟慮願念惄思也詩曰惄如調飢禄祉履戩祓禧禠祜福也詩曰福履綏之俾爾戩穀祓禄康矣禠禧書傳不見其義未詳禋祀祠蒸甞禴祭也書曰禋于六宗餘者皆以爲四時祭名也儼恪祗翼諲恭欽寅熯敬也儼然敬貌書曰夙夜惟寅詩曰我孔熯矣諲未詳朝旦夙晨晙早也晙亦明也􅓄竢替戾厎止徯待也書曰徯我后今河北人語亦然替戾厎者皆止也止亦相待噊幾烖殆危也幾猶殆也噊烖未詳􅠟汽也謂相摩近治肆古故也治未詳肆古見詩書肆故今也肆旣爲故又爲今今亦爲故故亦爲今此義相反而兼通者事例在下而皆見詩惇亶祜篤掔仍肶埤竺腹厚也頻仍埤益肶輔皆重厚掔然厚貌餘皆見詩書載謨食詐僞也載者言而不信謨者謀而不忠書曰朕不食言話猷載行訛言也詩曰愼爾出話猷者道道亦言也周禮曰作盟詛之載今江東通謂語爲行丗以妖言爲訛遘逢遇也謂相遭遇遘逢遇遻也轉復爲相觸遻遘逢遇遻見也行而相值即見顯昭覲釗覿見也顯昭明見也逸書曰釗我周王監瞻臨涖頫相視也皆謂察視也鞠訩溢盈也詩曰降此鞠訩孔魄哉延虚無之言間也孔穴延魄虚無皆有間隙餘未詳瘞幽隱匿蔽竄微也微謂逃藏也左傳曰其徒微之是也訖徽妥懷安按替戾底底尼定曷遏止也妥者坐也懷者至也按抑按也替廢皆止住也戾底義見詩傳國語曰戾乆將底孟子曰行或尼之今以逆相止爲遏徽未詳豫射厭也詩曰服之無斁豫未詳烈績業也謂功業也績勲功也謂功勞也功績質登平明考就成也功績皆有成詩曰質爾民人禮記曰年穀不登穀梁傳曰平者成也事有分明亦成濟也梏梗較頲庭道直也梏梗較頲皆正直也詩曰旣庭且碩頲道無所屈密康靜也皆安靜也豫寧綏康柔安也皆見詩書平均夷弟易也皆謂易直矢弛也弛放弛易也相延易希寡鮮罕也罕亦希也鮮寡也謂少酬酢侑報也此通謂相報荅不主于飲酒毗劉㬥樂也謂樹木葉缺落䕃䟽㬥樂見詩覭髳苐離也謂草木之叢茸翳薈也茀離即彌離彌離猶蒙蘢耳孫叔然字别爲義失矣蠱謟貳疑也蠱惑有貳心者皆疑也左傳曰天命不謟音縚楨翰儀榦也詩曰維周之翰儀表亦體榦弼棐輔比俌也書曰天畏棐忱易曰比輔也俌猶輔也疆界邊衞圉垂也疆埸竟界邊旁營衞守圉皆在外垂也左傳曰聊以固吾圉也昌敵彊應丁當也書曰禹拜昌言彊者好與物相當值浡肩揺動蠢迪俶厲作也浡然興作貌蠢動作公羊傳曰俶甚也穀梁傳曰始厲樂矣肩見書迪未詳玆斯咨呰巳此也呰巳皆方俗異語嗟咨􅜚也今河北人云􅜚歎音兎罝閑狎串貫習也串厭串貫貫􅏸也今俗語皆然曩塵佇淹留乆也塵垢佇企淹滯皆稽乆逮及曁與也公羊傳曰㑹及暨皆與也逮亦及也騭假格陟躋登陞也方言曰魯衞之閒曰騭梁益曰格禮記曰天王登遐公羊傳曰躋者何陞也揮盝歇涸竭也月令曰無漉陂池國語曰水涸而成梁揮振去水亦爲竭歇通語挋拭刷清也振訊抆拭掃刷皆所以爲絜清鴻昏於顯間代也鴻鴈知運代昏主代明明亦代昏顯即明也聞錯亦相代於義未詳饁饟饋也國語曰其妻饁之遷運徙也今江東通言遷徙秉拱執也兩手持爲拱廞熈興也書曰庶績咸熈廞見周官衞蹶假嘉也詩序曰假樂嘉成王也餘未詳廢稅赦舎也詩曰召伯所稅舎放置捿遟憩休苦㕟齂呬息也棲遲遊息也苦勞者冝止息憩見詩㕟齂呬皆氣息貌今東齊呼息爲呬也供峙共具也皆謂備具􅤷憐惠愛也􅤷韓鄭語今江東通呼爲憐娠蠢震戁妯騷感訛蹶動也娠猶震也詩曰憂心且妯無感我􅍤兮或寢或訛蠢戁騷蹶皆揺動貌覆察副審也覆校察視副長皆所爲審諦契滅殄絶也今江東呼刻斷物爲契斷郡臻仍迺侯乃也迺即乃餘未詳迪繇訓道也義皆見詩書僉咸胥皆也東齊曰胥見方言育孟耆艾正伯長也育養亦爲長正伯皆官長艾歷也長者多更歷歷秭算數也歷歷數也今以十億爲秭論語云何足算也歷傅也傅近艾歷覛胥相也覛謂相視也公羊傳曰胥盟者何相盟也艾歷未詳乂亂靖神弗淈治也論語曰子有亂臣十人淈書序作汩音同耳神未詳餘並見詩書頥艾育養也汝潁梁宋之閒曰艾方言云汱渾隕墜也汱渾皆水落貌際接翜捷也捷謂相接續也毖神溢愼也神未詳餘見詩書鬱陶繇喜也孟子曰鬱陶思君禮記曰人喜則斯陶陶斯詠詠斯猶猶即繇也古今字耳馘穧獲也今以獲賊耳爲馘獲禾爲穧並見詩阻艱難也皆險難剡㗉利也詩曰以我剡耜允任壬佞也書曰而難任人允信者佞人似信壬猶任也俾拼抨使也皆謂使今見詩俾拼抨使從也四者又爲隨從儴仍因也皆謂因縁董督正也皆謂御正享孝也享祀孝道珍享獻也珍物冝獻榖梁傳曰諸侯不享覲縱縮亂也縱放掣緒皆亂法也探篡俘取也書曰俘厥寳玉篡者奪取也探者摸取也徂在存也以徂爲存猶以亂爲治以曩爲曏以故爲今此皆詁訓義有反覆旁通美惡不嫌同名在存省士察也書曰在璿璣玉衡士理官亦主聽察存即在烈枿餘也晉衞之間曰蘖陳鄭之間曰烈迓迎也公羊傳曰跛者迓跛者元良首也左傳曰狄人歸先軫之元良未聞薦摯臻也薦進也摯至也故皆爲臻臻至也賡揚續也書曰乃賡載歌揚未詳祔祪祖也祔付也付新死於祖廟祪毁廟主即尼也即猶今也尼者近也尸子曰恱尼而來逺尼定也尼者止也止亦定邇幾暱近也暱親近也妥安坐也禮記曰妥而后傳命貉縮綸也綸者繩也謂牽縛縮貉之今俗語亦然貉嗼安定也皆靜定見詩伊維也發語辭伊維侯也詩曰侯誰在矣互相訓時寔是也公羊傳曰寔來者何是來也卒猷假輟巳也猷假未詳求酋在卒就終也詩曰嗣先公爾酋矣成就亦終也其餘未詳崩薨無禄卒徂落殪死也古者死亡尊卑同稱耳故尚書堯曰殂落舜曰陟方乃死爾雅音釋卷上夫扶興許譍鍵件摛癡贍時艶璞朴檮桃少詩照鑚子管㑹古外稡子外剟掇礫歷搴愆稂郎易以豉了療篲似銳企丘豉躅逐釋詁第一肈兆俶昌叔辟并亦幠呼厖亡江誕但訏吁箌罩昄蒲板晊之日極紀力弔的艐宗摧昨雷卑必寐予羊汝鮮息淺省先郢令力政綝勑金彀古豆妉丁含般盤樂洛遹聿度鐸諏子須彞夷辟婢亦辜孤辠罪齯倪鮐台耇狗亶丁但諶市林敖五報粤曰繇由於烏㪉閤郃合盍胡臘妃配媲普計纂子管忥戲謚侍貉陌謐密顗擬頠魚毀隕于閔磒于敏摽婢眇蘦零令力政畛稹告谷迥戸頂逷惕壞怪圯房美垝鬼寀七代樣毅義戡堪獮尠刺次亹尾蠠蜜釗招劭邵勔泯騖務暋閔強其丈卭五剛台怡下同卑必二陽賜予與餤談藎燼相息亮勴慮熲古迥劼苦黠掔牽疇直留暀旺藐邈褘衣輯集噰於恭勰恊重直龍觳學罊苦計殱尖揫子由蒐搜遄船亟欺冀數朔亟居力寁昝阬坑漮康差叉柬簡慄栗戁女板恐丘勇慴之渉痡普胡瘏徒虺灰顇悴瘽勤瘉俞癙䑕癵力專㾖里痒羊疧祁痗妹瘥伹何痱肥􅓠亶瘵債癠徂細悝里盱吁繇遥勩與丗癉丁賀勞力報來賚強其丈思司嗣惄溺袚廢褫斯禴藥恪墟各諲因熯而善晙俊􅓄須竢士厎止徯胡禮噊聿烖哉􅠟析汽蓋肶毗埤脾竺篤遘搆遻悟監鑒涖利頫眺瘞於計匿女力妥他窠遏烏曷射亦梏谷較角頲他頂易以豉矢弛並音户紙鮮息淺酢昨㬥剥樂洛覭陌髳蒙謟叨棐匪比毗志俌甫圉語呰紫􅜚嗟串五患貫慣黻弗畯俊諈竹睡諉女睡累劣僞􅉃慘窶求矩薆僾並音愛唈烏合挾叶浹接琛勑金紕備淩凌傭勑容氂離罽計燎料煁市針烓頃苛何筑竹奘徂朗駔粗泭孚遝沓畫畫賑之忍分符間懠才細僁屑度徒各眕之忍硈苦角嚻五刀懟隊縭離號毫謼火故逜悟顁丁佞遺唯季菼他敢薍五患餐孫耋迭輶酋俴踐綯陶躐獵疐致跲其禁柢帝閒閑斃弊踣蒲北僨糞僵姜潰會隌唵冥莫定䵑女乙闍都殛紀力冥亡定仆赴諗審弇掩䦧呼歷燬毀偟皇懊烏報忨五館愒苦蓋榰枝柱注慒囚黹致耻紩柣廯息淺逭換閒諫俔胡典沄云沆胡黨䠊扶味燠於六堛孚逼齊才細饘之然矏武延襺吉典靦他典姡滑鬻之六翢徒刀纛徒到妎胡計芾貝狃女九復扶又般班還旋緍民辟婢亦漦仕其華胡瓜釋訓第三斤居覲條由便婢緜廱於容惴之瑞憢許堯番波矯居兆藹烏害濟子禮思賜踖夕佗陀忯徒啓懕於占媞題懋茂慀暮慅騷赫釋墫七旬瞿居具蹻巨盧憍嬌夭夢亡工訰之閏懪雹儚亡崩爞同敖五髙傲五耗佌此痯管瘐羊主惸瓊愽圑怲柄畇巡畟楚力郝釋穟遂穮方遥桎丁秩穫戸郭溞蘇刀淅錫鐄横丁爭盡咨忍喈皆佻勑料契苦結尼女乙儵徒的嘒呼惠㻆胡犬刺七賜懽貫愮遥謞虚各訿子尓甹普經夆芳逢掣充丗遹述萲袁諼喧號毫雩于曁忌僩限烜喧尰時勇骭莧瘍羊拇畝媛于眷猗於冝襢但裼息馮平籧渠篨除夸誇擗婢亦拊撫緎域縫逢殿丁練屎希呻申幬紬侜張留罶力九釋親第四妣比從父從祖從母從並才用切晜昆姪徒結姒似娣第公鍾嫡的嬪頻
