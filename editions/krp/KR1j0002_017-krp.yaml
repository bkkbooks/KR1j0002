body:
  text: 寓屬鼢䑕地中行者鼸䑕以頰裏藏食鼷䑕有螫毒者鼶䑕夏小正曰鼶鼬則穴鼬䑕今鼬似鼦赤黃色大屋啖䑕江東呼爲鼪音牲鼩䑕小鼩也亦名鼩鼭䑕未詳鼣䑕山海經說獸云狀如鼣䑕然形則未詳鼫䑕形大如䑕頭似兎尾有毛青黃色好在田中食粟豆關西呼爲鼩䑕見廣雅音瞿鼤䑕鼨䑕皆未詳豹文鼮䑕䑕文彩如豹者漢武帝時得此䑕孝廉郎終軍知之賜絹百匹鼳䑕今江東山中有鼰䑕狀如䑕而大蒼色在樹木上音巫覡䑕屬牛曰齝食之已乆復出嚼之羊曰齥今江東呼齝爲齥音漏洩麋鹿曰齸江東名咽爲齸齸者䶗食之所在依名云鳥曰嗉咽中裹食處寓䑕曰嗛頰裹貯食處寓謂獼猴之類寄寓木上齸屬獸曰釁自奮釁人曰撟頻伸夭撟魚曰須鼔須息鳥曰臭張兩翅皆氣體所須
  hash: sha256:967bfbcf39ee3877968a00ac5a625ad4dcaba4c649fbe8a22a4027d958700b13
