seq: 17
front:
  text: 鸛鷒鶝鶔如鵲短尾射之銜矢射人或說曰鸛鷒鶝鶔一名􅦀羿鵲鵙醜其飛也翪竦翅上下鳶烏醜其飛也翔布翅翺翔鷹隼醜其飛也翬鼓翅翬翬然疾鳧鴈醜其足蹼脚指間有幕蹼屬相著其踵企飛却伸其脚跟企直烏鵲醜其掌縮飛縮脚腹下亢鳥嚨嚨謂喉嚨亢即咽其粻嗉嗉者受食之處別名嗉今江東呼粻鶉子鳼鴽子鸋別䳺鶉雛之名雉之暮子爲鷚晚生者今呼少雞爲鷚鳥之雌雄不可别者以翼右掩左雄左掩右雌鳥少美長醜爲鶹鷅鶹􅝎猶留離詩所謂留離之子二足而羽謂之禽四足而毛謂之獸鵙伯勞也似鶷􅗾而大左傳曰伯趙是倉庚黧黃也其色黧黒而黃因以名云釋獸第十八麋牡麔牝麎其子䴠國語曰獸長麕䴠其跡躔脚所踐處絶有力狄鹿牡麚牝麀其子麛其跡速絶有力􅍪牡麌詩曰麀鹿麋麌鄭康成解即謂此也但重言耳牝麜其子麆其跡解絶有力豜狼牡貛牝狼其子獥絶有力迅兎子嬎俗呼曰其跡迒絶有力欣豕子豬今亦曰彘江東呼狶皆通名䝐豶俗呼小豶豬爲䝐子幺幼最後生者俗呼爲幺豚奏者豱今豱豬短頭皮理腠蹙豕生三豵二師一特豬生子常多故别其少者之名所寢橧橧其所卧蓐四豴皆白􅘻詩云有豕白蹢蹢蹄也其跡刻絶有力􅙊即豕髙五尺者牝豝詩云一發五豝虎竊毛謂之虦貓竊淺也詩曰有貓有虎貘白豹似熊小頭庳脚黒白駁能舐食銅鐵及竹骨節強直中實少髓皮辟濕或曰豹白色者别名貘甝白虎漢宣帝時南郡獲白虎獻其皮骨爪牙虪黒虎晉永嘉四年建平秭歸縣檻得之狀如小虎而黒毛深者爲班山海經云幽都山多玄虎玄豹貀無前足晉大康七年召陵扶夷縣檻得一獸似狗豹文有角兩脚即此種類也或說貀似虎而黒無前兩足鼰䑕身長須而賊秦人謂之小驢鼰似䑕而馬蹄一歳千斤爲物殘賊熊虎醜其子狗絶有力麙律曰捕虎一購錢三于其狗半之貍子􅡐今或呼豾貍貈子貆其雌者名􅭗今江東呼貉爲􅧯􅤘貒子貗貒豚也一名貛貔白狐其子􅩸一名執夷虎豹之屬麝父麕足脚似麕有香豺狗足脚似狗貙獌似貍今山民呼貙虎之大者爲貙豻音岸羆如熊黃白文似熊而長頭髙脚猛憨多力能拔樹木關西呼曰貑羆麢大羊麢羊似羊而大角貟銳好在山崖間麠大麃牛尾一角漢武帝郊雍得一角獸若麃然謂之麟者此是也麃即麞􅕱大麕旄毛狗足旄毛㺜長魋如小熊竊毛而黃今建平山中有此獸狀如熊而小毛麆淺赤黃色俗呼爲赤熊即魋也䝟貐類貙虎爪食人迅走迅疾狻麑如虦貓食虎豹即師子也出西域漢順帝時踈勒王來獻犎牛及師子穆天子傳曰狻猊日走五百里驨如馬一角不角者騏元康八年九眞郡獵得一獸大如馬一角角如鹿茸此即驨也今深山中人時或見之亦有無角者羱如羊羱羊似吴羊而大角角橢岀西方麐麕身牛尾一角角頭有肉公羊傳曰有麕而角猶如麂善登木健上樹貄脩毫毫毛長貙似貍今貙虎也大如狗文如貍兕似牛一角青色重千斤犀似豕形似水牛豬頭大腹􅋻脚脚有三蹄黒色三角一在頂上一在額上一在鼻上鼻上者即食角也小而不橢好食棘亦有一角者彚毛刺今蝟狀似䑕狒狒如人被髮迅走食人梟羊也山海經曰其狀如人面長脣黒身有毛及踵見人則笑交廣及南康郡山中亦有此物大者長丈許俗呼之曰山都貍狐貒貈醜其足蹯皆有掌蹯其跡􅚵􅚵指頭處蒙頌猱狀即蒙貴也狀如蜼而小紫黒色可畜健捕䑕勝於貓九眞日南皆出之猱亦獼猴之類猱蝯善援便攀援貜父善顧貑貜也似獼猴而大色蒼黒能貜持人好顧盼威夷長脊而泥泥少才力麔麚短脰脰項贙有力出西海大秦國有養者似狗多力獷惡豦迅頭今建平山中有豦大如狗似獼猴黃黒色多髯鬛如奮迅其頭能舉石擿人貜類也蜼卭鼻而長尾蜼似獼猴而大黃黒色尾長數尺似獺尾朱有岐鼻露向上雨即自縣於樹以尾塞鼻或以兩指江東人亦取養之爲物捷健時善椉領好登山峯猩猩小而好啼山海經曰人面豕身能言語今交阯封谿縣出猩猩狀貛㹠聲似小兒啼闕洩多狃說者云脚饒指未詳
