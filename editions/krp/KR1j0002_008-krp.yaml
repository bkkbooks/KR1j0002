seq: 8
front:
  text: 有事乎社而後出謂之冝有事祭也周官所謂冝乎社振旅闐闐振旅整衆闐闐羣行聲出爲治兵尚威武也幼賤在前貴勇力入爲振旅反尊卑也尊老在前復常儀也
  hash: sha256:473f5d51a5b9706a1c194e87424c9abf252f939b0e7de864cba6a614f1fee5c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0002_SBCK_008-1a}
body:
  text: 講武素錦綢杠以白地錦韜旗之竿纁帛縿纁帛絳也縿衆旒所著素陞龍于縿畫白龍於縿令上向練旒九練絳練也飾以組用綦組飾旒之邊維以縷用朱縷維連持之不欲令曳地周禮曰六人維王之太常是也緇廣充幅長尋曰旐帛全幅長八尺繼旐曰旆帛􅌭旐末爲燕尾者義見詩注旄首曰旌載旄於竿頭如今之幢亦有旒有鈴曰旂縣鈴於竿頭畫蛟龍於旒錯革鳥曰旟此謂合剥鳥皮毛置之竿頭即禮記云載鴻及鳴鳶因章曰旃以帛練爲旒因其文章不復畫之周禮云通帛爲旃旌旂釋地第九兩河閒曰冀州自東河至西河河南曰豫州自南河至漢河西曰雝州自西河至黒水漢南曰荆州自漢南至衡山之陽江南曰揚州自江南至海濟河間曰兖州自河東至濟濟東曰徐州自濟東至海燕曰幽州自易水至北狄齊曰營州自岱東至海此蓋殷制九州魯有大野今髙平鉅野縣東北大澤是也晉有大陸今鉅鹿北廣河澤是也秦有楊陓今在扶風汧縣西宋有孟諸今在梁國睢陽縣東北楚有雲夢今南郡華容縣東南巴丘湖是也吴越之間有具區今吴縣南太湖即震澤是也齊有海隅海濵廣斥燕有昭余祁今太原鄔陵縣北九澤是也鄭有圃田今滎陽中牟縣西圃田澤是也周有焦護今扶風池陽縣瓠中是也十藪東陵阠南陵息愼西陵威夷中陵朱滕北陵西隃鴈門是也即鴈門山也陵莫大於加陵今所在未聞梁莫大於溴梁溴水名梁隄也墳莫大於河墳墳大防八陵東方之美者有醫無閭之珣玗琪焉醫無閭山名今在遼東珣玗琪玉屬東南之美者有㑹稽之竹箭焉會稽山名今在山隂縣南竹箭篠也南方之美者有梁山之犀象焉犀牛皮角象牙骨西南之美者有華山之金石焉黃金礝石之屬西方之美者有霍山之多珠玉焉霍山今在平陽永安縣東北珠如今雜珠而精好西北之美者有崐崘虚之璆琳琅玕焉璆琳美玉名琅玕狀似珠也山海經曰崐崘山有琅玕樹北方之美者有幽都之筋角焉幽都山名謂多野牛筋角東北之美者有斥山之文皮焉虎豹之屬皮有縟綵者中有岱岳與其五穀魚鹽生焉言泰山有魚鹽之饒九府東方有比目魚焉不比不行其名謂之鰈狀似牛脾鱗細紫黑色一眼兩片相合乃得行今水中所在有之江東又呼爲王餘魚南方有比翼鳥焉不比不飛其名謂之鶼鶼似鳬青赤色一目一翼相得乃飛西方有比肩獸焉與邛邛岠虚比爲邛邛岠虚齧甘草即有難邛邛岠虚負而走其名謂之蟨吕氏春秋曰北方有獸其名爲蟨䑕前而兔後趨則頓走則顛然則邛邛岠虚亦冝䑕後而兔前前髙不得取甘草故湏蟨食之今鴈門廣武縣夏屋山中有獸形如兔而大相負共行土俗名之爲蟨䑕音厥北方有比肩民焉迭食而迭望此即半體之人各有一鼻一孔一臂一脚亦猶魚鳥之相合更望備驚急中有枳首蛇焉岐頭蛇也或曰今江東呼兩頭蛇爲越王約髮亦名弩絃此四方中國之異氣也五方邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰邑國都也假令百里之國五十里之界界各十里也下溼曰隰大野曰平廣平曰原髙平曰陸大陸曰阜大阜曰陵大陵曰阿可食者曰原可種穀給食陂者曰阪阪陀不平下者曰溼公羊傳曰下平曰隰歳曰葘今江東呼初耕地反草爲葘二歳曰新田詩曰于彼新田三歳曰畬易曰不菑畬野東至於泰逺西至於邠國南至於濮鈆北至於祝栗謂之四極皆四方極逺之國觚竹北戸西王母日下謂之四荒觚竹在北北戸在南西王
