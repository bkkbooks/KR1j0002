canonical_identifier: bkk:krp/KR1j0002/krp/v1/juan/9
seq: 9
front:
  text: 母在西日下在東皆四方昬荒之國次四極者九夷八狄七戎六蠻謂之四海九夷在東八狄在北七戎在西六蠻在南次四荒者岠齊州以南戴日爲丹穴岠去也齊中也北戴斗極爲空桐戴值東至日所出爲太平西至日所入爲太蒙即蒙汜也太平之人仁丹穴之人智太蒙之人信空桐之人武地氣使之然也
  hash: sha256:9e21af37eb795b9f7f18f50293fb8b993004902ffb109910bc273ec4a099767b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0002_SBCK_009-1a}
body:
  text: 四極釋丘第十丘一成爲敦丘成猶重也周禮曰爲壇三成今江東呼地髙堆者爲敦再成爲陶丘今濟隂定陶城中有陶丘再成銳上爲融丘鐵頂者三成爲崐崘丘崐崘山三重故以名云如椉者椉丘形似車椉也或云椉謂稻田塍埒如陼者陼丘水中小洲爲陼水潦所止泥丘頂上汚下者方丘胡丘形四方絕髙爲之京人力所作非人爲之丘地自然生水潦所還埒丘謂丘邊有界埒水繞環之上正章丘頂平澤中有丘都丘在池澤中當途梧丘途道途出其右而還之畫丘言爲道所規畫途出其前戴丘道出丘南途出其後昌丘道出丘北水出其前渻丘水出其後沮丘水出其右正丘水出其左營丘今齊之營丘淄水過其南及東如覆敦者敦丘敦盂也邐迆沙丘旁行連延左髙咸丘右髙臨丘前髙旄丘詩云旄丘之葛兮後髙陵丘偏髙阿丘詩云陟彼阿丘宛中宛丘宛謂中央隆髙丘背有丘爲負丘此解宛丘中央隆峻狀如負一丘於背上左澤定丘右陵泰丘宋有太丘杜云見史記如畝畝丘丘有壟界如田畝如陵陵丘陵大阜也丘上有丘爲宛丘嫌人不了故重曉之陳有宛丘今在陳郡陳縣晉有濳丘今在太原晉陽縣淮南有州黎丘今在壽春縣天下有名丘五其三在河南其二在河北說者多以州黎宛營爲河南潜敦爲河北者案此方稱天下之名丘恐此諸丘碌碌未足用當之殆自别更有
  hash: sha256:76a875a02edfa790fefef3853cb9c7e396b43ac4071af995d39d177496e1bc22
