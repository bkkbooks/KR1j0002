body:
  text: 謂之榮不榮而實者謂之秀榮而不實者謂之英釋木第十四槄山榎今之山楸栲山樗栲似樗色小白生山中因名云亦類漆樹柏椈禮記曰鬯曰以椈髡梱未詳椵柂白椵也樹似白楊梅柟似杏實酢柀煔煔似松生江南可以爲舩及棺材作柱埋之不腐櫠椵柚屬也子大如盂皮厚二三寸中似枳食之少味杻檍似棣細葉葉新生可飼牛材中車􅦿關西呼杻子一名土橿楙木瓜實如小瓜酢可食椋即來今椋材中車􅦿栵栭樹似檞樕而庳小子如細粟可食今江東亦呼爲栭栗檴落可以爲杯器素柚條似橙實酢生江南時英梅雀梅楥柜桏未詳或曰桏當爲柳柜桏似柳皮可以煑作飲栩杍柞樹味荎著釋草已有此名疑誤重出藲荎今之刺榆杜甘棠今之杜梨狄臧橰貢綦皆未詳朹檕梅朹樹狀似梅子如指頭赤色似小㮈可食朻者聊未詳魄榽橀魄大木細葉似檀今江東多有之齊人諺曰上山斫檀榽橀先彈梫木桂今南人呼桂厚皮者爲木桂桂樹葉似枇杷而大白華華而不著子叢生巖嶺枝葉冬夏常青閒無雜木棆無疵棆楩屬似豫章椐樻腫節可以爲杖檉河柳今河旁赤莖小楊旄澤柳生澤中者楊蒲柳可以爲箭左傳所謂董澤之蒲權黃英輔小木權輔皆未詳杜赤棠白者棠棠色異異其名諸慮山櫐今江東呼櫐爲藤似葛而麤大欇虎櫐今虎豆纒蔓林樹而生莢有毛刺今江東呼爲㯿欇音涉杞枸檵今枸杞也杬魚毒杬大木子似栗生南方皮厚汁赤中藏卵果檓大椒今椒樹叢生實大者名爲檓楰䑕梓楸屬也今江東有虎梓楓欇欇楓樹似白楊葉貟而岐有脂而香今之楓香是寓木宛童寄生樹一名蔦无姑其實夷无姑姑榆也生山中葉貟而厚剥取皮合漬之其味辛香所謂无夷櫟其實梂有梂彚自裹檖羅今楊檖也實似梨而小酢可食楔荆桃今櫻桃旄冬桃子冬熟榹桃山桃實如桃而小不解核休无實李一名趙李痤椄慮李今之麥李駁赤李子赤棗壷棗今江東呼棗大而銳上者爲壷壷猶瓠也邊要棗子細腰今謂之鹿盧棗櫅白棗即今棗子白熟樲酸棗樹小實酢孟子曰養其樲棗楊徹齊棗未詳遵羊棗實小而貟紫黒色今俗呼之爲羊矢棗孟子曰曽晢嗜羊棗洗大棗今河東猗氏縣出大棗子如雞卵煑塡棗未詳蹶洩苦棗子味苦晳無實棗不著子者還味棯棗還味短苦櫬梧今梧桐樸枹者樸屬叢生者爲枹詩所謂棫樸枹櫟謂櫬采薪采薪即薪指解今樵薪棪㯈其棪實似奈赤可食劉劉杙劉子生山中實如梨酢甜核堅出交趾櫰槐大葉而黒槐樹葉大色黒者名爲櫰守宫槐葉晝聶宵炕槐葉晝日聶合而夜炕布者名爲守宮槐槐小葉曰榎槐當爲楸楸細葉者爲榎大而皵楸老乃皮麤皵者爲楸小而皵榎小而皮麤皵者爲榎左傳曰使擇美榎椅梓即楸桋赤梀白者梀赤棟樹葉細而岥銳皮理錯戾好叢生山中中爲車􅦿白梀葉貟而岥爲大木終牛棘即馬棘也其刺麤而長灌木叢木詩曰集於灌木瘣木苻婁謂木病尫傴癭腫無枝條蕡藹樹實繁茂菴藹枹遒木魁瘣謂樹木叢生根枝節目盤結磈磊棫白桵桵小木叢生有刺實如耳璫紫赤可啖棃山樆即今棃樹桑辨有葚梔辨半也女桑桋桑今俗呼桑樹小而條長者爲女桑樹榆白枌枌榆先生葉却著莢皮色白唐棣栘似白楊江東呼夫栘常棣棣今山中有棣樹子如櫻桃可食檟苦荼樹小似梔子冬生葉可煑作羹飲今呼早采者爲荼晚取者爲茗一名荈蜀人名之苦荼樕樸心槲樕别名榮桐木即梧桐棧木干木橿木也江東呼木觡檿桑山桑似桑材中作弓及車轅木自弊柛弊踣立死椔不弊頓蔽者翳樹䕃翳覆地者詩云其椔其翳木相磨槸樹枝相切磨棤皵謂木皮甲錯梢梢櫂謂木无枝柯梢櫂長而殺者樅松葉柏身今大廟梁材用此木尸子所謂松柏之䑕不知堂宻之有美樅檜柏葉松身詩曰檜楫松舟句如羽喬樹枝曲卷似鳥毛羽下句曰朻上句曰喬如木楸曰喬楸樹性其上竦如竹箭曰苞篠竹性叢生如松柏曰茂枝葉婆娑如槐曰茂言亦扶踈茂盛柷州木髦柔英皆未詳槐棘醜喬枝皆翹竦桑柳醜條阿那垂條椒榝醜莍莍蓃子聚生成房貌今江東亦呼莍榝似茱茰而小赤色桃李醜核子中有核人瓜曰華之桃曰膽之棗李曰疐之樝棃曰鑚之皆啖食治擇之名樝似棃而酢澁見
