body:
  text: 須屬釋畜第十九騊駼馬山海經云北海内有獸狀如馬名騊駼色青野馬如馬而小岀塞外駮如馬倨牙食虎豹山海經云有獸名駮如白馬黒尾倨牙音如鼓食虎豹騉蹄趼善陞甗甗山形似甑上大下小騉蹄蹄如趼而健上山秦時有騉蹄苑騉駼枝蹄趼善陞甗騉駼亦似馬而牛蹄小領盜驪穆天子傳曰天子之駿盜驪緑耳又曰右服盗驪盜驪千里馬領頸絶有力駥即馬髙八尺膝上皆白惟馵四骹皆白驓骹膝下也四蹢皆白首俗呼爲踏雪馬前足皆白騱後足皆白翑前右足白啓左傳白啓服左白踦前左脚白後右足白驤左白馵後左脚白易曰震爲馵足駵馬白腹騵駵赤色黒鬛驪馬白跨驈驪黒色跨髀閒白州驠州竅尾本白騴尾枺白尾白駺俱尾毛白馰顙白顚戴星馬也白達素縣素鼻莖也俗所謂漫髗徹齒面足尚疾馬屬犘牛出巴中重千斤犦牛即犎牛也領上肉犦胅起髙二尺許狀如橐駝肉鞍一邊健行者日三百餘里今交州合浦徐聞縣出此牛犤牛犤牛庳小今之㹄牛也又呼果下牛出廣州髙涼郡魏牛即犪牛也如牛而大肉數千斤出蜀中山海經曰岷山多犪牛犣牛旄牛也髀膝尾皆有長毛犝牛今無角牛犑牛未詳角一俯一仰觭牛角低仰皆踴觢今竪角牛黒脣犉毛詩傳曰黃牛黒脣此冝通謂黒脣牛黒眥牰眼眥黒黒耳犚黒腹牧黒脚犈皆别牛黒所在之名其子犢今青州呼犢爲體長牬長身者絶有力欣犌牛屬羊牡羒謂吴羊白羝牝牂詩曰牂羊墳首夏羊黒羖䍽牡羭黒羝也歸藏曰兩壷兩羭牝羖今人便以牂羖爲白黒羊名角不齊觤一短一長角三觠羷觠角三匝羳羊黃腹腹下黃未成羊羜俗呼五月羔爲羜絶有力奮羊屬犬生三猣二師一玂此與豬生子義同名亦相出入未成毫狗狗子未生㲦毛者長喙獫短喙猲獢詩曰載獫猲獢絶有力狣尨狗也詩曰無使尨也吠狗屬雞大者蜀今蜀雞蜀子雓雛子名未成雞僆今江東呼雞少者曰僆音練也絶有力奮諸物有氣力多者無不健自奮迅故皆以名云雞屬馬八尺爲駥周禮云馬八尺已上爲駥牛七尺爲犉詩曰九十其犉亦見尸子羊六尺爲羬尸子曰大羊爲羬六尺彘五尺爲􅙊尸子曰大豕爲􅙊五尺今漁陽呼猪大者爲􅙊狗四尺爲獒公羊傳曰靈公有害狗謂之獒也尚書孔氏傳曰犬髙四尺曰獒即此義雞三尺爲鶤陽溝巨鶤古之名雞六畜爾雅卷下經三千一百一十三字注七千八百九十字
