body:
  text: 釋山第十一河南華河西嶽河東岱河北恒江南衡山三襲陟再成英一成坯山大而高崧山小而高岑銳而高嶠卑而大扈小而眾巋小山岌大山峘屬者嶧獨者蜀上正章宛中隆山脊岡未及上翠微山頂冢崒者厜㕒山如堂者密如防者盛巒山嶞重甗隒左右有岸𠩂大山宮小山霍小山別大山鮮山絕陘多小石磝多大石礐多草木岵無草木峐山上有水埒夏有水冬無水澩山豄無所通谿石戴土謂之崔嵬土戴石為砠山夾水澗陵夾水澞山有穴為岫山西曰夕陽山東曰朝陽泰山為東嶽華山為西嶽霍山為南嶽恒山為北嶽嵩高為中嶽梁山晉望也
