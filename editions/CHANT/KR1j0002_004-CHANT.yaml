body:
  text: 釋親第四父為考母為妣父之考為王父父之妣為王母王父之考為曾祖王父王父之妣為曾祖王母曾祖王父之考為高祖王父曾祖王父之妣為高祖王母父之世父叔父為從祖祖父父之世母叔母為從祖祖母父之晜弟先生為世父後生為叔父男子先生為兄後生為弟謂女子先生為姊後生為妹父之姊妹為姑父之從父晜弟為從祖父父之從祖晜弟為族父族父之子相謂為族晜弟族晜弟之子相謂為親同姓兄之子弟之子相謂為從父晜弟子之子為孫孫之子為曾孫曾孫之子為玄孫玄孫之子為來孫來孫之子為晜孫晜孫之子為仍孫仍孫之子為雲孫王父之姊妹為王姑曾祖王父之姊妹為曾祖王姑高祖王父之姊妹為高祖王姑父之從父姊妹為從祖姑父之從祖姊妹為族祖姑父之從父晜弟之母為從祖王母父之從祖晜弟之母為族祖王母父之兄妻為世母父之弟妻為叔母父之從父晜弟之妻為從祖母父之從祖晜弟之妻為族祖母父之從祖祖父為族曾王父父之從祖祖母為族曾王母父之妾為庶母祖王父也晜兄也母黨母之考為外王父母之妣為外王母母之王考為外曾王父母之王妣為外曾王母母之晜弟為舅母之從父晜弟為從舅母之姊妹為從母從母之男子為從母晜弟其女子子為從母姊妹妻黨妻之父為外舅妻之母為外姑姑之子為甥舅之子為甥妻之晜弟為甥姊妹之夫為甥妻之姊妹同出為姨女子謂姊妹之夫為私男子謂姊妹之子為出女子謂晜弟之子為姪謂出之子為離孫謂姪之子為歸孫女子子之子為外孫女子同出謂先生為姒後生為娣女子謂兄之妻為嫂弟之妻為婦長婦謂稚婦為娣婦娣婦謂長婦為姒婦婚姻婦稱夫之父曰舅稱夫之母曰姑姑舅在則曰君舅君姑沒則曰先舅先姑謂夫之庶母為少姑夫之兄為兄公夫之弟為叔夫之姊為女公夫之女弟為女妹子之妻為婦長婦為嫡婦眾婦為庶婦女子子之夫為壻壻之父為姻婦之父為婚父之黨為宗族母與妻之黨為兄弟婦之父母壻之父母相謂為婚姻兩壻相謂為亞婦之黨為婚兄弟壻之黨為姻兄弟嬪婦也謂我舅者吾謂之甥也
