body:
  text: 釋獸第十八寓屬麋牡麔牝麎其子䴠其迹躔絶有力狄鹿牡麚牝麀其子麛其迹速絶有力麉麕牡麌牝麜其子麆其迹解絶有力豜狼牡貛牝狼其子獥絶有力迅兔子嬔其迹迒絶有力欣豕豬䝐豶么幼奏者豱豕生三豵二師一特所寢橧四蹢皆白豥其迹刻絶有力豟牝豝虎竊毛謂之虦貓貘白豹甝白虎虪黑虎貀無前足鼳鼠身長須而賊秦人謂之小驢熊虎醜其子狗絶有力麙貍子𧳙貈子貆貒子貗貔白狐其子豰麝父麕足豺狗足貙獌似貍羆如熊黃白文麢大羊麠大麃牛尾一角麂大麕旄毛狗足魋如小熊竊毛而黃猰貐類貙虎爪食人迅走狻麑如虦貓食虎豹驨如馬一角不角者騏羱如羊麟麕身牛尾一角猶如麂善登木貄修毫貙似貍兕似牛犀似豕彙毛刺狒狒如人被髮迅走食人貍狐貒貈醜其足蹯其迹厹蒙頌猱狀猱猿善援貜父善顧威夷長脊而泥麔麚短脰贙有力豦迅頭蜼卬鼻而長尾時善乘領猩猩小而好啼闕泄多狃鼠屬蚡鼠鼸鼠鼷鼠鼶鼠鼬鼠鼩鼠鼭鼠鼣鼠鼫鼠鼤鼠鼨鼠豹文鼮鼠𪕯鼠齸屬牛曰齝羊曰齛麋鹿曰齸鳥曰嗉寓鼠曰嗛須屬獸曰釁人曰嬌魚曰須鳥曰狊
