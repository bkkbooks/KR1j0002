body:
  text: 釋詁第一初哉首基肇祖元胎俶落權輿始也林蒸天帝皇王后辟公侯君也弘廓宏溥介純夏幠厖墳嘏丕奕洪誕戎駿假京碩濯訏宇穹壬路淫甫景廢壯冢簡菿昄至將業席大也幠厖有也迄臻極到赴來弔艐格戾懷摧詹至也如適之嫁徂逝往也賚貢錫畀豫貺賜也儀若祥淑鮮省臧嘉令類綝彀攻穀介徽善也舒業順敘也舒業順敘緒也怡懌悅欣衎喜愈豫愷康妉般樂也悅懌愈釋賓協服也遹遵率循由從自也遹遵率循也靖惟漠圖詢度咨諏究如慮謨猷肇基訪謀也典彝法則刑範矩庸恆律戛職秩常也柯憲刑範辟律矩則法也辜辟戾罪也黃髮齯齒鮐背耇老壽也允孚亶展諶誠亮詢信也展諶允慎亶誠也謔浪笑敖戲謔也粵于爰曰也爰粵于也爰粵于那都繇於也敆郃盍翕仇偶妃匹會合也仇讎敵妃知儀匹也妃合會對也妃媲也紹胤嗣續纂緌績武係繼也忥諡溢蟄慎貉謐顗頠密寧靜也隕隕湮下降墜摽蘦落也命令禧畛祈請謁誶誥告也永悠迥違遐逖闊遠也永悠迥遠遐也虧壞圮垝毀也矢雉引延順薦劉繹尸旅陳也尸職主也尸寀也寀寮官也績緒采業服宜貫公事也永羕引延融駿長也喬嵩崇高也崇充也犯奢果毅剋捷功肩堪勝也勝肩戡劉殺克也劉獮斬刺殺也亹亹蠠沒孟敦勗釗茂劭勔勉也騖務昏暋強也卬吾台豫朕身甫余言我也朕余躬身也台朕賚畀卜陽豫也肅延誘薦餤晉寅藎進也羞餞迪蒸進也詔亮左右相導也詔相導左右助勴也亮介尚右也左右亮也緝熙烈顯昭晧熲光也劼鞏堅篤掔虔膠固也疇孰誰也暀暀皇皇藐藐穆穆休嘉珍褘懿鑠美也諧輯協和也關關噰噰音聲和也協燮和也從申神加弼崇重也觳悉卒泯忽滅罄空畢罊殲拔殄盡也苞蕪茂豐也揫斂屈收戢搜裒鳩樓聚也肅齊遄速亟屢數迅疾也寁駿肅亟遄速也壑坑坑滕徵隍漮虛也黎庶蒸多醜師旅衆也洋觀裒衆那多也流差柬擇也戰栗震驚戁竦恐懾懼也痡瘏虺穨玄黃劬勞咎悴瘽愈鰥戮癙癵㾖癢疧疵閔逐疚痗瘥痱疸瘵瘼癠病也恙寫悝盱繇慘恤罹憂也倫勩邛敕勤愈庸疸勞也勞來強事謂翦篲勤也悠傷憂思也懷惟慮願念惄思也祿祉履戩祓禧禠祜福也禋祀祠蒸嘗禴祭也儼恪祗翼諲恭欽寅熯敬也朝旦夙晨晙早也䇓俟替戾砥止徯待也噊幾災殆危也𧰙汽也治肆古故也肆故今也惇亶祜篤掔仍肶埤竺腹厚也載謨食詐偽也話猷載行訛言也遘逢遇也遘逢遇遻也遘逢遇遻見也顯昭覲釗覿見也監瞻臨涖眺相視也鞠訩溢盈也孔魄哉延虛無之言間也瘞幽隱匿蔽竄微也訖徽妥懷安按替戾底砥尼定曷遏止也豫射厭也烈績業也績勳功也功績質登平明考就成也梏梗較頲庭道直也密康靜也豫寧綏康柔安也平均夷弟易也矢弛也弛易也希寡鮮罕也鮮寡也酬酢侑報也毗劉暴樂也覭髳茀離也蠱諂二疑也楨翰儀幹也弼棐輔比俌也疆界邊衛圉垂也昌敵強應丁當也浡肩搖動蠢迪俶厲作也茲斯咨呰已此也嗟咨𨲠也間狎串貫習也曩塵佇淹留久也逮及暨與也騭假格陟躋登升也揮盝歇涸竭也挋拭刷清也鴻昏於顯間代也饁餉饋也遷運徙也秉拱執也廞熙興也衛蹶假嘉也廢稅赦舍也棲遲憩休苦㕟齂呬息也供峙共具也𢜮憐惠愛也娠蠢震戁妯騷感訛蹶動也覆察副審也契滅殄絶也郡臻仍乃侯乃也迪繇訓道也僉咸胥皆也育孟耆艾正伯長也艾歷也曆秭算數也歷傅也艾歷覛胥相也乂亂靖神弗淈治也頤艾育養也汱渾隕墜也際接翜捷也毖神溢慎也鬱陶繇喜也馘穧獲也阻艱難也剡㗉利也允任壬佞也俾拼抨使也俾拼抨使從也儴仍因也董督正也享孝也珍享獻也縱縮亂也探篡俘取也徂在存也在存省士察也烈枿餘也迓迎也元良首也薦摯臻也賡揚續也祔祪祖也即尼也尼定也邇幾昵近也妥安坐也貉縮綸也貉嗼安定也伊維也伊維侯也時實是也卒猷假輟已也求酋在卒就終也崩薨無祿卒徂落殪死也
