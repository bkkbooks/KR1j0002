body:
  text: 釋宮第五宮謂之室室謂之宮牖戶之間謂之扆其內謂之家東西牆謂之序西南隅謂之奧西北隅謂之屋漏東北隅謂之宧東南隅謂之㝔柣謂之閾棖謂之楔楣謂之梁樞謂之椳樞達北方謂之落時落時謂之𢨪垝謂之坫牆謂之墉鏝謂之杇椹謂之𣖳地謂之黝牆謂之堊樴謂之杙在牆者謂之楎在地者謂之臬大者謂之栱長者謂之閣闍謂之臺有木者謂之榭雞棲於弋為榤鑿垣而棲為塒植謂之傳傳謂之突杗廇謂之梁其上楹謂之梲閞謂之槉栭謂之楶棟謂之桴桷謂之榱桷直而遂謂之閲直不受檐謂之交檐謂之樀容謂之防連謂之簃屋上薄謂之筄兩階間謂之鄉中庭之左右謂之位門屏之間謂之寧屏謂之樹閍謂之門正門謂之應門觀謂之闕宮中之門謂之闈其小者謂之閨小閨謂之閣弄門謂之閎門側之堂謂之孰橛謂之闑闔謂之扉所以止扉謂之閣瓴甋謂之甓宮中弄謂之壼廟中路謂之唐堂途謂之陳路旅途也路場猷行道也一達謂之道路二達謂之歧旁三達謂之劇旁四達謂之衢五達謂之康六達謂之莊七達謂之劇驂八達謂之崇期九達謂之逵室中謂之時堂上謂之行堂下謂之步門外謂之趨中庭謂之走大路謂之奔隄謂之梁石杠謂之徛室有東西廂曰廟無東西廂有室曰寢無室曰榭四方而高曰臺陜而修曲曰樓
