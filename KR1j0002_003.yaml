body:
  text: 釋訓第三明明斤斤察也條條秩秩智也穆穆肅肅敬也諸諸便便辨也肅肅翼翼恭也雍雍優優和也兢兢憴憴戒也戰戰蹌蹌動也晏晏溫溫柔也業業翹翹危也惴惴憢憢懼也番番矯矯勇也桓桓烈烈威也洸洸赳赳武也藹藹濟濟止也悠悠洋洋思也蹶蹶踖踖敏也薨薨增增衆也蒸蒸遂遂作也委委他他美也忯忯惕惕愛也稱稱格格舉也蓁蓁孽孽戴也懕懕媞媞安也祁祁遲遲徐也丕丕簡簡大也存存萌萌在也懋懋慔慔勉也庸庸慅慅勞也赫赫躍躍迅也綽綽爰爰緩也坎坎蹲蹲喜也瞿瞿休休儉也旭旭蹻蹻憍也夢夢訰訰亂也懪懪邈邈悶也儚儚洄洄惛也版版蕩蕩僻也爞爞炎炎薰也居居究究惡也仇仇敖敖傲也佌佌瑣瑣小也悄悄慘慘慍也痯痯瘐瘐病也殷殷惸惸忉忉慱慱欽欽京京忡忡惙惙怲怲奕奕憂也畇畇田也畟畟耜也郝郝耕也繹繹生也穟穟苗也綿綿穮也挃挃穫也栗栗衆也溞溞淅也烰烰蒸也俅俅服也峨峨祭也鍠鍠樂也穰穰福也子子孫孫引無極也顒顒卬卬君之德也丁丁嚶嚶相切直也藹藹萋萋臣盡力也噰噰喈喈民協服也佻佻契契愈遐急也宴宴粲粲尼居息也哀哀悽悽懷報德也倏倏嘒嘒罹禍毒也晏晏旦旦悔爽忒也皋皋琄琄刺素食也歡歡愮愮憂無告也憲憲泄泄制法則也謔謔謞謞崇讒慝也翕翕訿訿莫供職也速速蹙蹙惟逑鞫也抑抑密也秩秩清也甹夆掣曳也朔北方也不俟不來也不遹不蹟也不徹不道也勿念勿忘也萱諼忘也每有雖也饎酒食也舞號雩也暨及也蠢不遜也如切如磋道學也如琢如磨自修也瑟兮僩兮恂栗也赫兮烜兮威儀也有斐君子終不可諼兮道盛德至善民之不能忘也既微且腫骭瘍為微腫足為腫是刈是濩濩煮之也履帝武敏武迹也敏拇也張仲孝友善父母為孝善兄弟為友有客宿宿言再宿也有客信信言四宿也美女為媛美士為彥其虛其徐威儀容止也猗嗟名兮目上為名式微式微者微乎微者也之子者是子也徒御不驚輦者也袒裼肉袒也暴虎徒搏也馮河徒涉也籧篨口柔也戚施面柔也夸毗體柔也婆娑舞也劈拊心也矜憐撫掩之也緎羔裘之縫也殿屎呻也幬謂之帳侜張誑也誰昔昔也不辰不時也凡曲者為罶鬼之為言歸也
